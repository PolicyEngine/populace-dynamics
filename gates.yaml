  gate_2:
    name: family and benefit outputs
    description: >-
      tranche 2a_marital_fertility scores marriage, divorce, remarriage,
      widowhood, occupancy, cohort-nuptiality, dissolved-state stock, and
      fertility transitions against mh85_23 and cah85_23 (+ ind2023er
      deaths); household-composition transitions (MX23REL) are the separate
      UNLOCKED tranche 2b, and the marriage x earnings joint is the separate
      UNLOCKED tranche 2c; benefit formulas earn per-rule "computes exactly"
      status.
    thresholds:
      # DRAFT gate-2 pre-lock evidence, v2 -- ROUND-1 REFEREE AMENDMENTS
      # APPLIED (PR #79 comment 4910467957). PRE-LOCK, NOT RATIFIED:
      # locked stays false and status is draft_pending_referee_round.
      # The evidence lives in runs/gate2_floors_v2.json (built by
      # scripts/build_gate2_floors.py from the retrospective PSID history
      # files). v1 is retained as the round-1 record. No model reads
      # this; it changes no locked value. Every tolerance below is
      # machine-bound to the 100-seed floor by
      # tests/test_gates_derivations.py: tolerance == round(floor mean +
      # k * floor sd, rounding), k = 4 (ratified), AND tolerance <= T_max =
      # ln(1.5) (the round-1 power cap). The lock ceremony ratified
      # k = 4; ratification record in the status block below.
      locked: true
      status: locked
      ratified: >-
        2026-07-08 by merge of PR 79 (merge commit 82006877) under the
        maintainer's standing campaign directive of 2026-07-07
        ("build until reasonable for scoring these reforms"),
        exercised only after the full lock ceremony: adversarial
        round 1 AMEND BEFORE LOCK (PR 79 comment 4910467957, seven
        findings), fixes d43dfcb (comment 4910712436: coherent
        per-seed protocol, 100-seed floors, ln(1.5) power cap,
        sequence/stock cells, governance inheritance, anchor
        decomposition), verification round LOCK AS-IS (comment
        4910856982; every finding recomputed, bindings
        perturbation-tested, independent floor rebuild reproduced).
        Locked thresholds change only through a public amendment
        noted in this file's history (amendment_rules apply,
        including no_self_rescue).
      referee_round: PR #79 comment 4910467957
      tranche_id: 2a_marital_fertility
      holdout_basis: [mh85_23, cah85_23]
      floor_run: runs/gate2_floors_v2.json
      superseded_floor: >-
        runs/gate2_floors_v1.json -- the round-1 record the referee
        reviewed, retained committed (repo keeps every floor version);
        the v2 rebuild on 100 split seeds supersedes it for the
        derivations.
      scope:
        note: >-
          tranche 2a_marital_fertility covers the marital-transition (first
          marriage, remarriage, divorce, widowhood), occupancy,
          cohort-nuptiality, dissolved-state stock, and fertility
          statistics from mh85_23 and cah85_23 (+ ind2023er deaths). It is
          the ratified locked tranche; 2b (household composition, MX23REL)
          and 2c (marriage x earnings) are its UNLOCKED sibling tranches
          (gate_2b / gate_2c), each with its own future lock ceremony.
        provision_class_coverage:
          marital_and_survivor_timing: >-
            COVERED (gated, tranche 2a_marital_fertility) -- first-marriage /
            divorce / widowhood / divorced-origin-remarriage hazards,
            ever-married occupancy, cohort nuptiality, and dissolved-state
            stock shares fix when survivor and spousal eligibility opens and
            closes.
          caregiver_and_child_in_care_survivor: >-
            NOT COVERED HERE -- caregiver provisions and the child-in-care
            survivor component depend on household composition (who lives
            with whom), which is the separate UNLOCKED tranche
            2b_relationship_household (the MX23REL relationship-matrix, now
            gate_2b.holdout_basis, not scored in tranche 2a). A 2b tranche
            lock must precede authorising these.
          marriage_x_earnings_joint: >-
            NOT COVERED -- no gate-2 statistic touches the marriage x
            earnings joint (who marries whom), on which spousal/survivor
            benefit LEVELS depend. Declared the separate UNLOCKED tranche
            2c_marriage_earnings_joint (reported-not-gated), not silence.
        remarriage_numerator_note: >-
          The origin-split remarriage numerator excludes post-separation
          starts (still legally married, no post-dissolution exposure) to
          keep it state-consistent with the divorced/widowed person-year
          denominator; origin is attributed from prev_how_ended so
          same-year dissolve-remarry events keep their true origin.
        certification_scope:
          # The map finding 4 asks for: which reform-provision classes each
          # tranche's pass supports. DERIVED from (a) the locked scope_note's
          # provision_class_coverage (three classes) and (b) issue #74's per-
          # provision minimum-model-surface matrix (components EH earnings, SF
          # statutory formula, CA claiming, M mortality, MS marriage/
          # survivorship, FC fertility/caregiving, DI disability, REV revenue,
          # LR long-run projection). Both are cited below. Promoted into the
          # locked scope by the amendment-2 flip (amendment_history entry 2).
          derivation_basis:
            locked_scope_note: >-
              gate_2.thresholds.scope.provision_class_coverage -- the three
              provision classes (marital_and_survivor_timing;
              caregiver_and_child_in_care_survivor; marriage_x_earnings_joint)
              and their COVERED / NOT-COVERED status.
            provision_matrix: >-
              issue #74 "Replication anchors" -- the component-requirements-per-
              provision matrix. MS = marriage/survivorship (its Phase C is "gate 2
              proper", holdouts mh85_23 / MX23REL); FC = fertility/caregiving (its
              Phase D unlocks caregiver credits); a "(check)" column there means a
              component is needed "only for poverty/household or subgroup rows,
              not the core benefit calculation".
          tranches:
            2a_marital_fertility:
              certifies: >-
                the marital-transition and fertility timing/rate PROCESSES -- the
                46 gated cells, on mh85_23 + cah85_23 (+ deaths).
              supports:
                - >-
                  survivor / spousal ELIGIBILITY-TIMING incidence in GENERATED
                  marital histories -- when survivor and spousal eligibility
                  opens and closes (locked provision_class_coverage
                  .marital_and_survivor_timing = COVERED (gated); #74 MS-timing
                  component on the mh85_23 holdout). Evidence source: the 2a
                  PASS certifies the GENERATED side. The REAL-couples side of
                  this timing was validated SEPARATELY on real PSID couples with
                  no generated component (#84 earnings-sharing winners/losers
                  replication, memo on #74) -- that record, not any gate-2
                  verdict, carries the real-history side (fix A3: the tranche
                  pass does not stand in for the real-data replication).
                - >-
                  caregiver credits' childbearing / care-year ELIGIBILITY basis --
                  the fertility process (#74 FC component, Phase D), gated here via
                  the fertility cells (asfr.*, completed_fertility.*). Evidence
                  source: the 2a PASS certifies this GENERATED demographic INPUT
                  the credit keys on; the REAL-data caregiver replication ran
                  SEPARATELY on real careers + observed births (#86 anchor-2), the
                  fertility-history basis only -- no child-in-care or household
                  component was scored there or here (that is 2b).
                - >-
                  by-marital-status subgroup rows on the generated panel -- the
                  by-sex x marital-status splits ride on 2a's marital states and
                  the gated dissolved-state stock cells (share_divorced /
                  share_widowed), so they are certified HERE, under 2a, not 2b
                  (fix A1: they do not require household composition).
              does_not_support:
                - >-
                  household-unit incidence and poverty rows -- those require 2b
                  (household composition).
                - >-
                  spousal / survivor benefit LEVELS in GENERATED panels -- those
                  require 2c (marriage x earnings). But OWN-RECORD benefit levels
                  (bend points, the PIA formula, the taxable-maximum benefit
                  side) are NOT gate-2 tranche territory at all: they rest on
                  gate 1 (earnings) + the statutory-formula oracle (#78/#80;
                  #74's EH + SF components), OUTSIDE 2a / 2b / 2c (fix A2: do not
                  mark already-certified own-record scoring surfaces as tranche-
                  gated). COLA is likewise OUTSIDE 2a / 2b / 2c, but its levels
                  are not a pure gate-1 + oracle surface: the #74 COLA row also
                  marks the Phase-B claiming / mortality components (CA, M, DI) --
                  #78 covers CA, while M / DI are uncertified anywhere
                  (verification-round nit: COLA qualified, not dropped). A 2a
                  pass alone does NOT authorize CPS household-benefit deployment.
            2b_relationship_household:
              required_for:
                - >-
                  household-unit poverty statistics -- who lives with whom (locked
                  note: household composition, the MX23REL relationship matrix).
                - >-
                  the child-in-care survivor component (locked provision_class
                  _coverage.caregiver_and_child_in_care_survivor = NOT COVERED
                  HERE, "depend on household composition ... the MX23REL ...
                  tranche").
                - >-
                  the household-UNIT poverty rows of caregiver-credit and
                  minimum-benefit provisions -- household income aggregation
                  (#74 anchor 4's "household income" surface). By-marital-status
                  SUBGROUP rows do NOT belong here: they ride on 2a's marital
                  states and gated stock cells (share_divorced / share_widowed),
                  so they are certified under 2a. And #74's "(check)" columns
                  are NOT evidence of a 2b requirement: those marks are COMPONENT
                  requirements, not household-tranche marks -- for minimum
                  benefits they sit on MS and FC (2a-territory processes), for
                  caregiver credits on DI (disability, outside gate 2's tranches
                  entirely). The legend reads "needed only for poverty/household
                  or subgroup rows, not the core benefit calculation" (fix A1:
                  restore "or subgroup"; only household-UNIT rows -> 2b).
            2c_marriage_earnings_joint:
              required_for:
                - >-
                  joint earnings x marital processes in generated panels -- who
                  marries whom (locked provision_class_coverage
                  .marriage_x_earnings_joint = NOT COVERED).
                - >-
                  spousal / survivor benefit LEVELS -- earnings sharing, the
                  spousal amount (#74 "Survivor 75% / spousal / earnings sharing"
                  depends on the marriage x earnings joint for the benefit level,
                  distinct from 2a's eligibility timing).
          provision_class_map:
            # One row per class in the locked scope_note. requires_tranche lists
            # every tranche a class's certification needs; locked_coverage is
            # the exact coverage designation of the locked provision_class
            # _coverage entry (its text before the " -- " gloss). Both are bound
            # EXACTLY -- pinned per-class lists and tokens, not subset /
            # startswith -- by tests/test_gates_derivations.py (referee fix B:
            # a one-token flip breaks a test).
            - provision_class: marital_and_survivor_timing
              locked_coverage: COVERED
              requires_tranche: [2a_marital_fertility]
              note: >-
                survivor / spousal eligibility TIMING; the 46 gated cells fix when
                eligibility opens and closes.
            - provision_class: caregiver_and_child_in_care_survivor
              locked_coverage: NOT COVERED HERE
              requires_tranche: [2a_marital_fertility, 2b_relationship_household]
              note: >-
                caregiver-credit eligibility rides on 2a's fertility process, but
                the child-in-care survivor component and every household-level
                incidence / poverty row require 2b (MX23REL household
                composition). A 2a pass certifies the demographic basis, not the
                household outcome.
            - provision_class: marriage_x_earnings_joint
              locked_coverage: NOT COVERED
              requires_tranche: [2c_marriage_earnings_joint]
              note: >-
                spousal / survivor benefit LEVELS depend on who-marries-whom
                (assortative earnings); declared a later tranche, not silence.
      statistic: >-
        Per cell, the absolute log rate ratio |ln(rbar_candidate,s /
        r_holdout,s)| between a candidate's family-transition rate for
        the seed-s holdout persons -- rbar_candidate,s, the mean over K=20
        pre-registered draws (5200 + k) of the cell rate -- and that seed's
        HOLDOUT half's own empirical rate (rate_a in the floor's
        noise_floor_per_seed) -- symmetric and scale-free, the same shape
        as the mortality |log hazard ratio|.
      protocol:
        option: >-
          a (finding 1) -- the gate-1 mirror: per-seed person-disjoint
          holdout with train-complement fitting, for which the
          half-vs-half floor is exactly the null. Chosen over option (b)
          because it mirrors gate-1's locked per-seed protocol and keeps
          the 4-of-5 seed conjunction operative (both the candidate rate
          and the reference rate vary with the seed).
        gate_seeds: [0, 1, 2, 3, 4]
        floor_seeds: 0-99 (tolerance stability; finding 2)
        split: >-
          Person-disjoint 50/50 half-split of the marital panel's persons
          (populace_dynamics.harness.panel.split_panel_by_person,
          fraction=0.5, seed=s). Side A (the drawn half) is seed s's
          HOLDOUT; side B is the train complement. Per-seed holdout
          person-ids are committed in runs/gate2_floors_v2.json
          holdout_ids (sha256, derivable from the seed via the pinned
          numpy Generator).
        varies_per_seed: >-
          the 50/50 person split (hence the holdout set A, its reference
          rates, and the train complement B the candidate refits on).
        candidate: >-
          Refit per seed on side B; the seed-s holdout persons (side A)
          are excluded from all fitting. The candidate then SIMULATES side
          A's persons' family histories at K=20 pre-registered draws (numpy
          default_rng(5200 + k), k=0..19), scored on the 20-draw mean cell
          rate, via the same annual person-year construction, weighted by
          the person-constant PSID weight, and emits each cell's rate at
          holdout (~50%) scale. Amended 2026-07-08 (amendment 1,
          amendment_history) from one frozen simulation replicate to the
          mean over K=20 draws. Registration history: every committed run
          v1-v9 registered the single draw as numpy.random.default_rng(4200
          + seed) -- the pre-amendment locked text named only the simulation
          seed, not the 4200 offset. The amended 20-draw stream
          default_rng(5200 + k) is the committed forensics convention (#94),
          distinct from the 4200 + s single-draw stream so the committed
          single-draw artifacts stay auditable.
        scored_against: >-
          side A's own empirical rate (rate_a), committed per gate seed in
          noise_floor_per_seed. The half-vs-half floor |ln(rate_A/rate_B)|
          is then exactly the null a faithful candidate realises.
        pass_rule: >-
          Seed-level conjunction. Seed s passes iff every gate-eligible
          cell's |ln(rbar_candidate,s / rate_a,s)| <= its derived tolerance
          at seed s, where rbar_candidate,s is the mean over K=20
          pre-registered draws (5200 + k) of the cell RATE, then scored once
          as |ln(rbar / rate_a)| (NOT the mean of the per-draw |ln| scores);
          the gate passes iff >=4 of 5 gate seeds pass. Report-only cells
          and the external anchors are published, never gated. Ratified
          2026-07-08 (amendment 1, amendment_history); the tolerances and
          the 46-cell 4-of-5-seed conjunction are unchanged from the lock.
        faithful_candidate_oc:
          # Recomputed on the STABILISED 100-seed floor (finding 2): the
          # design intends ~4 sigma and now delivers it. Bound in
          # runs/gate2_floors_v2.json faithful_candidate_oc.
          n_gated_cells: 46
          p_seed_pass: 0.9404
          p_gate_pass_4_of_5: 0.9685
          basis_note: >-
            Amendment 1 (ratified 2026-07-08, amendment_history) basis
            reconciliation. This operating characteristic is computed on a
            DRAW-NOISE-FREE half-normal basis: a faithful candidate's per-cell
            score is modelled as half-normal with the floor's realized_sigma
            (floor sigmas only, no simulation-draw term). The amended
            mean-over-K=20-draws estimator shares that basis (the 20-draw mean
            rate approximates the draw-noise-free expected rate), so
            p_seed_pass 0.9404 and p_gate_pass_4_of_5 0.9685 stand UNCHANGED
            and are now achievable. Under the superseded single-draw estimator
            they were UNACHIEVABLE (finding 1): the injected per-cell
            draw-noise term dropped a faithful candidate to ~0.885 / 0.896 on
            the six measured cells, which the K=20 mean restores to
            ~0.939 / 0.967 -- back to the ratified numbers. Numbers unchanged;
            the estimator now shares the OC's derivation basis.
        fresh_run_artifact_schema:
          # The candidate-10 run contract (amendment 1, ratified 2026-07-08,
          # amendment_history), pinned in the locked protocol: a fresh
          # registration under the amended mean-over-K=20 estimator MUST
          # commit these three things, so a referee can recompute rbar from
          # the artifact and audit the dispersion the 20-draw mean would
          # otherwise hide. Prospective only; applies to no committed run
          # (candidates 1-9 stand FAIL under
          # governance.amendment_rules.no_self_rescue).
          applies_to: >-
            the fresh candidate-10 (or later) one-shot run registered AFTER
            the 2026-07-08 ratification; never a committed run.
          per_draw_per_cell_rates:
            required: true
            shape: [20, 46, 5]
            shape_dims: K_draws x gated_cells x gate_seeds
            rule: >-
              The run artifact commits every draw's per-cell rate
              r[k, cell, s] for all K=20 draws (numpy default_rng(5200 + k),
              k=0..19), all 46 gated cells, and all 5 gate seeds -- NOT only
              the 20-draw means. So rbar_candidate,s = mean over k of
              r[k, cell, s] recomputes cell-by-cell from the artifact, and the
              certified score |ln(rbar / rate_a)| is independently auditable
              rather than taken on trust from a committed mean.
          undefined_draw_rule:
            required: true
            pre_specified: true
            rule: >-
              If any gated cell's rate is UNDEFINED on any draw (empty
              simulated denominator -- zero exposure person-years for that
              cell on that draw), the RUN IS INVALIDATED and must be
              re-registered and re-run. No draw may be dropped, skipped,
              substituted, or re-rolled post-registration; rbar is always the
              mean over ALL K registered draws.
            rationale: >-
              Silently dropping an undefined draw would reintroduce exactly
              the post-hoc draw selection the mean-over-all-K rule forecloses:
              a smaller, outcome-selected draw set is not the pre-registered
              mean-of-20. Pre-committing run-invalidation keeps the estimator
              an honest, selection-free mean.
          per_draw_dispersion_disclosure:
            required: true
            gated: false
            report_only: true
            commit:
              per_cell_per_draw_sd: >-
                the standard deviation across the K=20 draws of each gated
                cell's rate (equivalently its log-rate), committed per gated
                cell per gate seed. Exposes per-draw over-dispersion the
                20-draw mean hides -- the single-draw estimator penalised it,
                by accident but really -- mirroring gate-1 amendment 2's
                catastrophe-cap instinct at report-only weight.
              max_per_draw_abs_ln_per_cell: >-
                the maximum over the K=20 draws of |ln(r[k, cell, s] /
                rate_a,s)| per gated cell per gate seed -- the worst
                single-draw excursion, reported alongside rbar, never gated.
            note: >-
              REPORT-ONLY: no hard dispersion cap gates the run (gate-1's
              proved decorative on the evidence). The disclosure exists so a
              referee can see whether a passing 20-draw mean conceals a wildly
              dispersed draw set.
      power_cap:
        # Finding 3: gate a cell only if its stabilised tolerance is
        # tight enough to reject a materially wrong model. Fixed a
        # priori BEFORE the tolerances were seen; which cells demote is
        # derived from the floor (cell_stability), never hand-picked.
        t_max: ln(1.5)
        rule: >-
          gate-eligible iff defined on every one of the 100 seeds AND >=20
          events on the weaker half of the worst seed AND stabilised
          tolerance <= T_max = ln(1.5) (a gated cell accepts at most a
          1.5x rate error) AND not superseded by a gating aggregate.
        aggregations:
          "widowhood.45+|male":
            gated: true
            members_demoted_to_report_only: >-
              widowhood.45-54|male, widowhood.55-64|male,
              widowhood.65-74|male, widowhood.75+|male
          "widowhood.45-64|female":
            gated: true
            members_demoted_to_report_only: >-
              widowhood.45-54|female, widowhood.55-64|female
          "first_marriage.35+|female":
            gated: true
            members_demoted_to_report_only: >-
              first_marriage.35-44|female, first_marriage.45+|female
          "first_marriage.35+|male":
            gated: true
            members_demoted_to_report_only: >-
              first_marriage.35-44|male, first_marriage.45+|male
        demoted_and_report_only: >-
          Per-age widowhood (male x4, female 45-54/55-64) and
          first-marriage (35-44, 45+ x sex) cells exceed T_max or are
          superseded by their aggregate; the widow(er)-origin remarriage
          cells (after_widowhood, widowed_under60, widowed_60plus) and the
          thin male-widowed stock shares exceed T_max; asfr.45-49 is below
          20 events. All report-only.
      governance:
        # Finding 5: the registration / one-shot / amendment machinery
        # reaches gate 2 by inheriting gate 1's, with gate-2 specifics.
        registration: >-
          Pre-registered on issue #42, exactly as every gate-1 candidate
          run. A gate-2 candidate registers its spec, its fitting
          exclusions (the seed-s holdout persons), and its simulation
          seeds BEFORE scoring. Outer runs are one-shot: a first pass must
          come from a fresh registration run on the pinned gate seeds.
        amendment_rules:
          inherits: gate_1
          no_self_rescue: >-
            Inherited verbatim from gate_1.amendment_rules: no candidate's
            committed run verdict changes under a rule proposed after that
            run; a gate rule amendment applies only to runs registered after
            its ratification.
          classifier_version_pin: >-
            Inherited: any version-sensitive scoring component records the
            library version used to derive a floor and to score candidates,
            and the two must match (no version-mismatched floor).
          amendments_only_via: >-
            public proposal + adversarial referee round + verification +
            maintainer ratification by merge -- the same ceremony gate 1's
            amendments follow.
          description_claims_exactly_the_scored_surface:
            # Standing governance rule promoted into the locked block by the
            # amendment-2 flip (amendment_history entry 2). Finding 8's
            # standing fix for finding 3's residual pattern risk.
            rule: >-
              A gate or tranche's description and holdout_basis must claim
              EXACTLY the surface its gated cells score at lock time -- no
              provision class, holdout, or transition named in the headline
              beyond what the cells actually gate. A headline broader than
              the scored surface is a lock defect, to be corrected before
              ratification.
            rationale: >-
              Forecloses the broad-headline -> bank the pass -> re-scope-down
              pattern (finding 3's residual accommodation risk). Gate 2 hit
              exactly this: a description and holdout_basis naming MX23REL /
              household-composition transitions the cells never scored, latent
              until the first pass (candidate 16, #109) made it load-bearing
              (review #106 finding 4).
            applies_to:
              - 2b_relationship_household
              - 2c_marriage_earnings_joint
              - gate_3
            attributed_to: >-
              amendment 2 referee round -- external architecture review #106
              finding 4; PR #111 adversarial round (finding 8
              recommendation).
        candidate_scale: >-
          PINNED to the seed-s holdout half (~50% of persons, side A); the
          candidate simulates exactly those persons, fixing the output
          scale the floor and tolerances are measured at.
        holdout_id_commitment: >-
          The sorted person-id list of each gate seed's holdout (side A)
          is sha256-committed in runs/gate2_floors_v2.json holdout_ids,
          derivable from the seed via the pinned numpy Generator
          (np.random.default_rng(seed).random over np.sort(unique
          person_id) < 0.5), so a candidate cannot pick its split.
