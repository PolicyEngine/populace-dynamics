          Per cell, the absolute log rate ratio |ln(rbar_candidate,s /
          rate_a,s)| between the candidate's household-composition rate for
          the seed-s holdout persons -- rbar_candidate,s, the MEAN over K=20
          pre-registered draws (5200 + k) of the cell RATE -- and that seed's
          HOLDOUT half's own empirical rate (rate_a in the floor's
          noise_floor_per_seed). Symmetric and scale-free, the same shape as
          the tranche-2a family-transition statistic.
        protocol:
          option: >-
            a -- the gate-1 / tranche-2a mirror: per-seed person-disjoint
            holdout with train-complement fitting, for which the half-vs-half
            floor is exactly the null. The 4-of-5 seed conjunction is
            operative (both the candidate rate and the reference rate vary
            with the seed).
          estimator: >-
            mean-over-K=20-draws (tranche 2a amendment 1, ratified
            2026-07-08, PR 96), re-used VERBATIM. rbar_candidate,s is the MEAN
            over K=20 pre-registered simulation draws (numpy
            default_rng(5200 + k), k=0..19; a stream DISTINCT from the split
            seeds), scored ONCE per cell as |ln(rbar_candidate,s /
            rate_a,s)| -- NOT the mean of the per-draw |ln| scores. Fix A
            replaced the superseded single-draw replicate (round-1 finding 1).
          candidate_draws: 20
          candidate_draw_stream: numpy.random.default_rng(5200 + k), k=0..K-1
          gate_seeds: [0, 1, 2, 3, 4]
          floor_seeds: 0-99 (tolerance stability)
          split: >-
            Person-disjoint 50/50 half-split of the MX23REL person panel's
            persons (split_panel_by_person, fraction=0.5, seed=s). Side A (the
            drawn half) is seed s's HOLDOUT; side B is the train complement.
            Per-seed holdout person-ids are sha256-committed in the floor's
            holdout_ids, derivable from the seed via the pinned numpy
            Generator.
          varies_per_seed: >-
            the 50/50 person split (holdout = side A of split_panel_by_person
            (seed=s)), the candidate's fit complement, and its K=20 simulated
            draws of the holdout.
          candidate: >-
            Refit per seed on side B (the seed-s holdout persons excluded from
            all fitting); SIMULATE side A's persons' households at K=20
            pre-registered draws (default_rng(5200 + k)); form the 20-draw
            mean cell rate rbar_candidate,s; emit each cell's rate at holdout
            (~50%) scale.
          scored_against: >-
            side A's own empirical rate (rate_a), committed per gate seed in
            the floor's noise_floor_per_seed. The half-vs-half floor
            |ln(rate_A/rate_B)| is exactly the null a faithful candidate
            realises.
          pass_rule: >-
            Seed-level conjunction. Seed s passes iff every gate-eligible
            cell's |ln(rbar_candidate,s / rate_a,s)| <= its derived tolerance
            at seed s (rbar_candidate,s the mean over K=20 draws of the cell
            RATE, then scored once, NOT the mean of the per-draw |ln|); the
            gate passes iff >=4 of 5 gate seeds pass. Report-only cells and
            the external anchor are published, never gated.
          faithful_candidate_oc:
            n_gated_cells: 46
            p_seed_pass: 0.9397
            p_gate_pass_4_of_5: 0.9678
            basis_note: >-
              Computed on a DRAW-NOISE-FREE half-normal basis (a faithful
              candidate's per-cell score ~ half-normal(realized_sigma), floor
              sigmas only, no simulation-draw term). The mean-over-K=20-draws
              estimator SHARES that basis, so the OC is ACHIEVABLE; under the
              SUPERSEDED single-draw estimator it was UNACHIEVABLE (round-1
              finding 1: one replicate injects ~one extra floor-sigma per
              cell, dropping a faithful candidate to roughly P(seed) 0.67 /
              P(gate>=4/5) 0.46). Numbers unchanged; the estimator now shares
              the OC's derivation basis. Bound to the floor's
              faithful_candidate_oc by tests/test_gates_derivations.py.
          fresh_run_artifact_schema:
            applies_to: >-
              a fresh candidate one-shot run registered AFTER this gate_2b
              lock; NEVER the floor build (which measures the real-vs-real
              half-vs-half null, no simulation, no draws).
            per_draw_per_cell_rates:
              required: true
              shape: [20, 46, 5]
              shape_dims: K_draws x gated_cells x gate_seeds
              rule: >-
                commit every draw's per-cell rate r[k, cell, s] for all K=20
                draws (default_rng(5200 + k), k=0..19), all 46 gated cells,
                and all 5 gate seeds -- so rbar_candidate,s recomputes
                cell-by-cell and |ln(rbar / rate_a)| is independently
                auditable, not taken on trust.
            undefined_draw_rule:
              required: true
              pre_specified: true
              rule: >-
                if any gated cell's rate is UNDEFINED on any draw (empty
                simulated denominator), the RUN IS INVALIDATED and must be
                re-registered and re-run. No draw may be dropped, skipped,
                substituted, or re-rolled; rbar is always the mean over ALL K
                registered draws.
            per_draw_dispersion_disclosure:
              required: true
              gated: false
              report_only: true
              commit:
                per_cell_per_draw_sd: >-
                  the sd across the K=20 draws of each gated cell's rate, per
                  gated cell per gate seed.
                max_per_draw_abs_ln_per_cell: >-
                  the maximum over the K=20 draws of |ln(r[k, cell, s] /
                  rate_a,s)| per gated cell per gate seed.
              note: >-
                REPORT-ONLY: no dispersion cap gates the run; the disclosure
                lets a referee see whether a passing 20-draw mean conceals a
                wild individual draw.
        power_cap:
          # Finding 3 / fix: gate a cell only if its stabilised tolerance is
          # tight enough to reject a materially wrong model. Which cells
          # demote is DERIVED from the floor (cell_stability), never
          # hand-picked. Aggregate bands fixed a priori before the rebuild.
          t_max: ln(1.5)
          rule: >-
            gate-eligible iff defined on every one of the 100 seeds AND >=20
            events on the weaker half of the worst seed AND stabilised
            tolerance <= T_max = ln(1.5) AND not superseded by a gating
            aggregate.
          aggregations:
            "coresident_parent.45+|female":
              gated: false
              members_demoted_to_report_only: >-
                coresident_parent.45-54|female,
                coresident_parent.55-64|female,
                coresident_parent.65-74|female, coresident_parent.75+|female
            "coresident_parent.45+|male":
              gated: false
              members_demoted_to_report_only: >-
                coresident_parent.45-54|male, coresident_parent.55-64|male,
                coresident_parent.65-74|male, coresident_parent.75+|male
            "coresident_grandchild.55+|female":
              gated: true
              members_demoted_to_report_only: >-
                coresident_grandchild.55-64|female,
                coresident_grandchild.65-74|female,
                coresident_grandchild.75+|female
            "coresident_grandchild.55+|male":
              gated: false
              members_demoted_to_report_only: >-
                coresident_grandchild.55-64|male,
                coresident_grandchild.65-74|male,
                coresident_grandchild.75+|male
            "multigen.65+|female":
              gated: false
              members_demoted_to_report_only: >-
                multigen.65-74|female, multigen.75+|female
            "multigen.65+|male":
              gated: false
              members_demoted_to_report_only: >-
                multigen.65-74|male, multigen.75+|male
          demoted_and_report_only: >-
            Only coresident_grandchild.55+|female gates among the six tail
            aggregates (fix H: 5 of 6 fail the cap); the coresident_parent
            45+ and multigen 65+ aggregates and the coresident_grandchild
            55+|male aggregate exceed T_max. multigen.55-64|{female,male} are
            judged STANDALONE (fix G: the multigen aggregate pools 65+ only,
            so a 55-64 error can no longer be offset at 75+), and both fail
            the cap honestly. All demoted cells are report-only.
        governance:
          # The registration / one-shot / amendment machinery reaches gate 2b
          # by inheriting gate 1's, exactly as tranche 2a does.
          registration: >-
            Pre-registered on issue #42, as every gate-1 / gate-2 candidate
            run. A gate-2b candidate registers its spec, its fitting
            exclusions (the seed-s holdout persons), and its simulation seeds
            BEFORE scoring. Outer runs are one-shot.
          amendment_rules:
            inherits: gate_1
            no_self_rescue: >-
              Inherited verbatim from gate_1.amendment_rules: no candidate's
              committed run verdict changes under a rule proposed after that
              run; a gate rule amendment applies only to runs registered
              after its ratification.
            classifier_version_pin: >-
              Inherited: any version-sensitive scoring component records the
              library version used to derive a floor and to score candidates,
              and the two must match.
            amendments_only_via: >-
              public proposal + adversarial referee round + verification +
              maintainer ratification by merge -- the same ceremony gate 1
              and tranche 2a amendments follow.
            description_claims_exactly_the_scored_surface: >-
              This tranche is bound by the standing rule promoted into
              gate_2.governance.amendment_rules (amendment 2): the covers /
              holdout_basis / estimand claim EXACTLY the scored surface --
              stocks + the six gated transitions, effectively 1997-2023,
              MX23REL only. No provision class or holdout is headlined beyond
              what the cells gate.
          candidate_scale: >-
            PINNED to the seed-s holdout half (~50% of persons, side A); the
            candidate simulates exactly those persons, fixing the output
            scale the floor and tolerances are measured at.
          holdout_id_commitment: >-
            The sorted person-id list of each gate seed's holdout (side A) is
            sha256-committed in runs/gate2b_floors_v1.json holdout_ids,
            derivable from the seed via the pinned numpy Generator, so a
            candidate cannot pick its split.
          weight_definition: >-
            flip-note 1 (mirrors tranche 2a's weight_definition). Every gated
            statistic is weighted by the person-constant most-recent positive
            PSID wave weight (populace_dynamics.data.panels.demographic_panel;
            population-scaled only from 1997, so the pooled estimand is
            effectively 1997-2023); persons with no positive wave weight, no
            joined age, or na sex are excluded (~17.8%, characterised in the
            floor's zero_weight_drop). There is NO unweighted gated statistic;
            the unweighted rate is reported alongside. The weighting is
            load-bearing (the weighted/unweighted gap exceeds tolerance on
            several cells), so it is pinned here, not inherited implicitly.
