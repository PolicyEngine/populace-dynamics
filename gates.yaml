        exactly one committed run's overall verdict changes -- candidate
        10 (PR #64) FAIL -> PASS -- and it is the run the amendment was
        written after; every other committed run keeps its FAIL, each on
        a battery, pairs-mean, cap, or pooled-Q0 failure recomputed in
        verdict_recomputation.runs. A proposed gate that passes exactly
        the candidate that motivated it, and nothing else, is precisely
        the pattern a fresh referee round exists to scrutinize; this
        proposal surfaces that rather than burying it.
