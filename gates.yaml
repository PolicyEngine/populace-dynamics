          # flip-note 7 / the floor's external_anchor
          # .required_before_ratifying_flip: the concept-bridged published
          # assortative-mating anchor is bundled in THIS flip PR, before
          # ratification -- REPORTED, never a level gate. Built by
          # scripts/gate2c_anchor_decomposition.py from the FROZEN floor's
