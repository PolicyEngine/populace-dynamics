            weighted by the person-constant most-recent positive PSID wave
            weight (populace_dynamics.data.panels.demographic_panel), for EVERY
            gated family INCLUDING the six event-window cells (fix F). There is
            NO unweighted gated statistic; the unweighted rate is reported
