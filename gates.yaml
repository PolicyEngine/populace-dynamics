      - id: 2026-07-08-mean-over-draws-estimator
        proposed: 2026-07-08
        referee_round:
          review: PR 96 comment 4915412987 (verdict AMEND BEFORE
            RATIFYING; three required fixes A/B/C -- record-honesty and
            prospective-spec items, not a redesign; the estimator change
            itself found sound and candidate-independent)
          fixes: 5b70840 (comment 4916048161 -- the c2 illustration digits
            made exact, currently_locked.registration_divergence disclosed,
            flip_on_ratification.flip_edits enumerated, and the
            fresh_run_artifact_schema candidate-10 contract pinned)
          verification: PR 96 comment 4916419901 (verdict RATIFY AS-IS;
            every number recomputed from the committed artifacts in a
            detached read-only worktree, the four new bindings
            perturbation-checked, full suite 986 passed / 41 skipped)
        ratified: 2026-07-08 by merge of PR 96 (merge commit fec27eb51),
          under the maintainer's standing campaign directive of 2026-07-07
          ("build until reasonable for scoring these reforms"), exercised
          only after the full ceremony (adversarial round AMEND, fixes
          5b70840, verification RATIFY AS-IS)
        flipped_live: this pull request
        content: >-
          The per-cell candidate score moved from ONE frozen simulation
          draw (registered numpy.random.default_rng(4200 + seed)) to the
          MEAN over K=20 pre-registered draws (numpy default_rng(5200 + k),
          k=0..19) of the cell RATE per gate seed, scored once as
          |ln(rbar_candidate,s / rate_a,s)| at BYTE-IDENTICAL tolerances and
          the same 46-cell, 4-of-5-seed conjunction -- only the candidate
          statistic changed, the error budget did not. Why: the locked
          tolerances derive from the 100-seed real-vs-real half-split floor
          (round(floor mean + 4*sd, 3)), which contains NO simulation-draw
          noise, yet the single-draw estimator injected a per-cell
          draw-noise term the budget never carried -- and it contradicted
          the locked block's OWN ratified faithful_candidate_oc, computed
          draw-noise-free (half-normal on the floor sigma). Under the
          single-draw estimator that faithful operating characteristic
          (p_seed_pass 0.9404, p_gate_pass_4_of_5 0.9685) was UNACHIEVABLE
          (~0.885 / 0.896 on the six measured cells); the K=20 mean restores
          it to ~0.939 / 0.967, back to the ratified numbers, by shrinking
          the injected draw noise ~sqrt(20) toward the draw-noise-free rate
          the tolerance was measured against. PROSPECTIVE ONLY
          (no_self_rescue): no committed run's verdict changes; candidates
          1-9 stand FAIL (runs/gate2_hazard_v1..v9.json, all gate_2_pass
          false), and the 20-draw OUTER verdict is not even computable from
          the committed single-outer-draw artifacts, so nothing is rescued
          -- the amended estimator fails the triggering candidates 8-9
          HARDER, not softer (their boundary cells carry real level offsets
          that averaging sharpens). The gate's first pass must come from a
          fresh candidate-10 registration under the locked
          protocol.fresh_run_artifact_schema. Evidence chain: #94
          (chronic-cell forensics, runs/gate2_forensics_v1.json) and the
          candidate 1-9 ladder (runs/gate2_hazard_v1..v9.json, registered on
          issue #42).
