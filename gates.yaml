          rate_a,s)| between the candidate's marriage x earnings rate for the
          seed-s holdout couples -- rbar_candidate,s, the MEAN over K=20
          pre-registered draws (5200 + k) of the cell RATE -- and that seed's
          HOLDOUT half's own empirical rate (rate_a in the floor's
          noise_floor_per_seed). Symmetric and scale-free, the same shape as
          the tranche-2a / 2b statistic.
        protocol:
          option: >-
            a -- the gate-1 / tranche-2a/2b mirror: per-seed COUPLE-DISJOINT
            holdout with train-complement fitting, for which the half-vs-half
            floor is exactly the null. The 4-of-5 seed conjunction is operative
            (both the candidate rate and the reference rate vary with the seed).
          estimator: >-
            mean-over-K=20-draws (tranche 2a amendment 1, ratified 2026-07-08,
            PR 96), re-used VERBATIM and adopted FROM THE START of this 2c
            build. rbar_candidate,s is the MEAN over K=20 pre-registered
            simulation draws (numpy default_rng(5200 + k), k=0..19; a stream
            DISTINCT from the split seeds), scored ONCE per cell as
            |ln(rbar_candidate,s / rate_a,s)| -- NOT the mean of the per-draw
            |ln| scores. The superseded single-draw replicate the 2b round-1
            referee flagged never enters.
          candidate_draws: 20
          candidate_draw_stream: numpy.random.default_rng(5200 + k), k=0..K-1
          gate_seeds: [0, 1, 2, 3, 4]
          floor_seeds: 0-99 (tolerance stability)
          split: >-
            COUPLE-DISJOINT 50/50 half-split by couple-graph CONNECTED
            COMPONENT (split_panel_by_person on attrs.component_id,
            fraction=0.5, seed=s; fix A). Union-find over the directed-couple
            edges groups both members of every couple into one component (<= 4
            persons), so NO couple straddles the two halves. Side A (the drawn
            half) is seed s's HOLDOUT; side B is the train complement. Per-seed
            holdout component/person-ids are sha256-committed in the floor's
            holdout_ids, derivable from the seed via the pinned numpy
            Generator.
          varies_per_seed: >-
            the 50/50 couple-disjoint split by component (holdout = side A of
            split_panel_by_person(component_id, seed=s)), the candidate's fit
            complement, and its K=20 simulated draws of the holdout.
          candidate: >-
            Refit per seed on side B (the seed-s holdout couples excluded from
            all fitting); SIMULATE side A's couples / marital events / earnings
            at K=20 pre-registered draws (default_rng(5200 + k)); form the
            20-draw mean cell rate rbar_candidate,s; emit each cell's rate at
            holdout (~50%) scale.
          scored_against: >-
            side A's own empirical rate (rate_a), committed per gate seed in
            the floor's noise_floor_per_seed. The half-vs-half floor
            |ln(rate_A/rate_B)| is exactly the null a faithful candidate
            realises.
          pass_rule: >-
            Seed-level conjunction. Seed s passes iff every gate-eligible
            cell's |ln(rbar_candidate,s / rate_a,s)| <= its derived tolerance
            at seed s (rbar_candidate,s the mean over K=20 draws of the cell
            RATE, then scored once, NOT the mean of the per-draw |ln|); the
            gate passes iff >=4 of 5 gate seeds pass. Report-only cells and the
            external anchor are published, never gated.
          candidate_construction:
            # fix D (round-1 finding 4): the candidate-side couple universe
            # and orientation the round-1 draft left implicit, pinned here.
            couple_emission: >-
              DIRECTED records per holdout ego: for each holdout-side couple
