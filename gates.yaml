                sparse-exit all-retire candidate that trivially passes this
                anchor (share 1.0) is caught INTERNALLY at recovery.60-66, not
                here (see degenerate_candidates).
            anchor_corroboration: >-
              t50_is_dominant is a CONSTANT of the frozen, sha-pinned Table 50
              and is additionally near-MECHANICAL (FRA conversion is automatic
              at FRA; Table 50 pools cessations over ALL ages against the PSID
              60-67 window -- an age-universe mismatch). It corroborates the
              dominance invariant choice; it constrains no candidate.
            concept_bridge: >-
              the exit-reason DOMINANCE is concept-robust: near FRA, retirement
              is the majority non-death exit in both the PSID self-report and
              Table 50 (FRA-conversion 455,267 vs medical-cessation 99,721).
