      family_c:
        pricing: >-
          binary ordinal (committed anchor orderings; no floor)
        pre_committed_in: '#113 (M5 row + the two compression fingerprints)'
        check: >-
          on the certified representative frame BOTH fingerprints reverse to
          required_representative_order (Kendall tau -> 1.0 vs the anchor),
          and no OTHER adjacency changes. If transport is real both reverse;
          if cosmetic they do not.
        orderings_derive_from_committed_anchors: >-
          fix F / finding 8a: the required after-orders are DERIVED by ranking
          the committed anchor values descending -- C1 the Mermin payroll-pct
          (runs/replication_cost_ordering_v1.json), C2 the Smith solvency deltas
          (runs/m2_pseudo_projection_v1.json F2 smith_year_deltas). No hand-written
          required order remains to swap (closes M10); the anchor itself is
          machine-checked.
        candidate_procedure:
          applies_to: >-
            a fresh W1 candidate that RUNS the two fingerprints on the certified
            representative frame AFTER the lock; this floor only RECORDS the
            committed anchor orderings (wart family_c_records_not_runs_the_reversal).
          c1_statistic: >-
            the outlay-side 75-year cost ordering of {PI, PPI, NRA->70, reduced
            COLA} computed by the committed #115 encodings (replication_ppi_mermin
            price/progressive-price-indexed amounts; replication_mermin_rows
            NRA + COLA factors) on the representative frame -- the m2 F4 statistic.
          c2_statistic: >-
            the exhaustion-delay ordering of {elimination, +2pp, +1pp, cap-$150k}
            computed by the committed #117 revenue/exhaustion ledger (m2 F2
            taxable-payroll x wage-base encoding) on the representative frame
            -- the m2 F2 statistic.
          engine_pins: >-
            the #115/#117 encodings are pinned to their committed run artifacts
            (m2_pseudo_projection_v1.json, replication_cost_ordering_v1.json)
            and the pe-us revision recorded in each; the candidate re-runs them
            on the representative frame, changing ONLY the frame.
          pass_rule: >-
            binary per fingerprint: PASS iff the representative-frame ordering
            EQUALS required_representative_order (Kendall tau 1.0 vs the anchor)
            with exactly the one committed adjacent swap vs psid_frame_order
            and no other adjacency change; both fingerprints must pass.
        fingerprints:
          c1:
            id: ppi_nra
            name: PPI<->NRA at the PIA bends
            anchor: Mermin Table 1 (75-yr payroll savings ordering)
            anchor_values: {price_indexing: 0.68, progressive_price_indexing: -0.14,
              nra_raised_to_70: -0.5, reduced_cola: -1.12}
            psid_frame_order: [price_indexing, nra_raised_to_70, progressive_price_indexing,
              reduced_cola]
            required_representative_order: [price_indexing, progressive_price_indexing,
              nra_raised_to_70, reduced_cola]
            swap_pair: [nra_raised_to_70, progressive_price_indexing]
            required_reversal: >-
              progressive_price_indexing outranks nra_raised_to_70
            source_before: >-
              runs/m2_pseudo_projection_v1.json F4 result_order (== runs/replication_cost_ordering_v1.json
              T2 ordering)
            source_after: >-
              runs/replication_cost_ordering_v1.json anchor_provenance.mermin_payroll_pct,
              ranked descending
            kendall_tau_before: 0.666667
            kendall_tau_after_required: 1.0
            mechanism: >-
              a representative frame carries more AIME above the second PIA
              bend, where progressive price indexing bites, so PPI's savings
              exceed NRA->70's -- reversing the compressed-career order.
          c2:
            id: elimination_plus2pp
            name: elimination<->+2pp at the taxable maximum
            anchor: Smith (2015) solvency-year deltas
            anchor_values: {elimination: 21, payroll_plus_2pp: 18, payroll_plus_1pp: 5,
              cap_150k: 1}
            psid_frame_order: [payroll_plus_2pp, elimination, payroll_plus_1pp,
              cap_150k]
            required_representative_order: [elimination, payroll_plus_2pp, payroll_plus_1pp,
              cap_150k]
            swap_pair: [payroll_plus_2pp, elimination]
            required_reversal: >-
              elimination outranks payroll_plus_2pp
            source_before: >-
              runs/m2_pseudo_projection_v1.json F2 result_order
            source_after: >-
              runs/m2_pseudo_projection_v1.json forecasts_detail.F2.smith_year_deltas,
              ranked descending
            kendall_tau_before: 0.666667
            kendall_tau_after_required: 1.0
            mechanism: >-
              a representative frame carries >16.1% of payroll above the wage
              base (the break-even), so taxable-max elimination's revenue gain
              exceeds +2pp's -- reversing the compressed-tail order.
        gate_partition: {gate_eligible: [fingerprint.ppi_nra, fingerprint.elimination_plus2pp],
          n_gate_eligible: 2, n_report_only: 0}
      protocol:
        option: >-
          a -- the gate-1 / tranche-2a/2b/2c mirror: per-seed HOUSEHOLD-DISJOINT
          holdout with train-complement fitting, for which the half-vs-half
          floor is exactly the null. The 4-of-5 seed conjunction is operative.
        estimator: >-
          mean-over-K=20-draws (tranche 2a amendment 1, ratified 2026-07-08
          PR 96), adopted FROM THE START of this W1 build. rbar_candidate,s
          is the MEAN over K=20 pre-registered deployment draws (numpy default_rng(9100
          + k), k=0..19; a stream DISTINCT from the split seeds), scored ONCE
          per cell as |ln(rbar / rate_a)| -- NOT the mean of the per-draw |ln|
          scores.
        candidate_draws: 20
        candidate_draw_stream: numpy.random.default_rng(9100 + k), k=0..K-1
        draw_stream_base: 9100
        statistic: >-
          |ln(rbar_candidate,s / rate_a,s)| per cell: rbar the K=20-draw mean
          of the deployed cell rate on seed s's holdout households, rate_a the
          holdout half's own weighted rate. Symmetric, scale-free -- the gate-2a/2b/2c
          statistic.
        varies_per_seed: >-
          the 50/50 household-disjoint split (holdout = side A of split_panel_by_person(household_id,
          seed=s)) and the candidate's K=20 REGENERATED deployment draws of
          the holdout households (see regenerated_surface). For a PSID-estimated
          transport candidate nothing REFITS per W1 seed: the generators are
          already fit on their own PSID holdouts (gate-2a/2b/2c/M4), FROZEN
          before W1, so the per-seed variation is the deployment draw ONLY.
          The gate-2 'fit complement' language does not carry -- W1 certifies
          transport of already-fit generators, not re-estimation (referee finding
          3).
        scored_against: >-
          side A's own weighted rate (rate_a), committed per gate seed in noise_floor_per_seed.
          The half-vs-half floor |ln(rate_A/rate_B)| is exactly the null a faithful
          transport realises.
        pass_rule: >-
          Seed-level conjunction. Seed s passes iff every gate-eligible family-A
          cell's |ln(rbar/rate_a)| <= its derived tolerance at seed s; the gate
          passes iff >=4 of 5 gate seeds pass. Report-only family-A cells, all
          family-B anchors, and the family-C fingerprints are published on their
          own rules.
        fresh_run_artifact_schema:
          applies_to: >-
            a fresh W1 candidate one-shot run registered AFTER the gate_w1 lock;
            NEVER this floor build (real-vs-real, no draws).
          regenerated_surface:
            rule: >-
              CONFORMANCE (fix B / finding 3): for every scored family-A cell
              the candidate must EMIT a GENERATED value -- the column the cell
              reads is RE-DRAWN by the deployed generators on each of the K=20
              deployment draws. COPYING a scored column from the frame is NON-CONFORMANT:
              it makes the candidate the identity map, which scores 0 and certifies
              nothing about the generators (the natural anchored-transport reading,
              so the protocol must state this explicitly).
            per_family:
              earnings_participation|profile|p90p50|p50p10: >-
                `earnings` (employment + self-employment before LSR) is RE-GENERATED
                by the deployed gate-1 earnings-history generator conditioned
                on the CPS covariates; the participation indicator and the within-cell
                quantiles are functions of the regenerated earnings, not of
                the frame's own earnings column.
              marital_share|coresident_spouse: >-
                marital status / spouse presence is RE-GENERATED by the deployed
                gate-2a/2b marital dynamics (terminal-state marital status),
                not copied from A_MARITL.
              hh_size_share: >-
                household size is RE-GENERATED by the deployed gate-2c household-composition
                dynamics, not copied from the frame's membership.
            identity_candidate_is_non_conformant: true
            audited_by: >-
              per_draw_dispersion_disclosure.max_per_draw_abs_ln_per_cell ==
              0 exposes an identity candidate (no regeneration -> zero across-draw
              dispersion); see degenerate_candidates.
          per_draw_per_cell_rates:
            required: true
            shape: [20, 53, 5]
            shape_dims: K_draws x gated_cells x gate_seeds
            rule: >-
              commit every draw's per-cell deployed rate r[k, cell, s] for all
              K=20 draws, all 53 gated cells, all 5 gate seeds, so rbar and
              |ln(rbar/rate_a)| recompute cell-by-cell.
          undefined_draw_rule:
            required: true
            pre_specified: true
            rule: >-
              if any gated cell's deployed rate is UNDEFINED on any draw, the
              RUN IS INVALIDATED and must be re-registered; no draw is dropped,
              skipped, or re-rolled.
          per_draw_dispersion_disclosure:
            required: true
            gated: false
            report_only: true
            fields: [per_cell_across_draw_sd, max_per_draw_abs_ln_per_cell]
            note: >-
              REPORT-ONLY, BOTH fields (the LOCKED gate-2 per_draw_dispersion_disclosure
              -- the v1 build dropped one, referee finding 9): the sd across
              the K=20 draws per gated cell per seed AND max_per_draw_abs_ln_per_cell
              (the worst single-draw |ln| excursion), so a referee sees whether
              a passing mean conceals a wild draw. max_per_draw_abs_ln_per_cell
              == 0 EXPOSES an identity candidate (no regeneration -> zero across-draw
              dispersion), which partially services finding 3.
        faithful_candidate_oc:
          n_gated_cells: 53
