            observation_grid: >-
              simulate earnings on the PSID family-file observation grid
              (annual income years 1968-1996, biennial 1998-2022; family-file
              income refers to the prior year), which defines which years are
              "observed", the MIN_EARNINGS_YEARS admission on that grid, and
              the NAWI-window birth filter -- nominal dollars, NOT real.
            weight: >-
              the demographic most-recent-positive PSID weight for every gated
              family INCLUDING the six event windows (fix F).
            event_window_support_and_detrend: >-
              earnings_around_* uses only events with an observed positive year
              in BOTH +/-3y sub-windows, and the emitted statistic is the
              post/pre median NET of the committed placebo deflator (fix E), so
              a real-terms candidate is scored on the event increment, not
              nominal drift.
            cut_provenance: >-
              flip-note 4: candidate evaluation uses the COMMITTED tercile cut
              levels, the shared-earnings adjacent-quintile cutpoints, and the
              placebo drift deflators -- all fixed on the FULL REAL earnings
              supply and applied to every half-split and to every candidate
              draw -- NOT values recomputed on simulated output. Recomputing
              cuts on candidate output would let a candidate shift its own
              categories; the categories are frozen with the floor.
            ci_invisible_a5b_residual: >-
              flip-note 3: a consistent marriage.all<->divorce.all-ONLY swap
              (round-1's literal A5) stays invisible to the always-runnable
              tier -- the two placebo-detrended references differ only 0.3%
              (1.0572 vs 1.0542) and no re-measure-robust data-free invariant
