        SHAPE / DOMINANCE): per gated anchor cell the candidate's own per-seed
        simulated invariant (prevalence min adjacent gap over the bridged bands;
        retirement-exit dominance margin) must exceed MARGIN_K=3 x the committed
        real half-split sd -- the MARGIN reading, not the bare ordinal. Symmetric
        and scale-free (internal); unit-honest bounded/ordinal (anchor), never
        scored as |ln ratio|.
      protocol:
        option: >-
          anchor-based (gate-1 external-check style). The internal cells use
          the gate-2 per-seed PERSON-DISJOINT half-split, for which the
          half-vs-half floor is exactly the null; the anchor cells use the
          candidate's own per-seed simulated invariant vs the concept-bridged
          admin shape/dominance, gated on the MARGIN (finding 3). The 4-of-5
          seed conjunction is operative.
        estimator: >-
          mean-over-K=20-draws (tranche 2a amendment 1, ratified 2026-07-08,
          PR 96), re-used VERBATIM and adopted FROM THE START of this M4 build.
          rbar_candidate,s is the MEAN over K=20 pre-registered simulation
          draws (numpy default_rng(5200 + k), k=0..19; a stream DISTINCT from
          the split seeds), scored ONCE per cell as |ln(rbar_candidate,s /
          rate_a,s)| -- NOT the mean of the per-draw |ln| scores. The
          superseded single-draw replicate the 2b/2c round-1 referees flagged
          never enters (finding 2 restored 5200+k from the drifted 4100+k).
        candidate_draws: 20
        candidate_draw_stream: numpy.random.default_rng(5200 + k), k=0..K-1
        draw_stream_base: 5200
        gate_seeds: [0, 1, 2, 3, 4]
        floor_seeds: 0-99 (tolerance stability)
        split: >-
          PERSON-DISJOINT 50/50 half-split (split_panel_by_person, fraction=0.5,
          seed=s). Side A (the drawn half) is seed s's HOLDOUT; side B is the
          train complement. NO person straddles the two halves.
        internal_statistic: >-
          per gated internal cell, |ln(rbar_candidate,s / rate_a,s)| <= the
          committed tolerance, where rbar is the mean over the 20 draws of the
          cell RATE (not the mean of per-draw scores).
        anchor_statistic: >-
          PINNED candidate-side rule (finding 3): per gated anchor cell, score
          the candidate's simulated holdout PER GATE SEED on the SAME
          mean-over-K=20-draws RATE basis as the internal cells (rbar over the
          5200+k draws). The invariant must hold WITH the margin: the
          candidate's per-seed statistic (prevalence min adjacent gap over the
          bridged bands; retirement-exit dominance margin) must exceed
          MARGIN_K=3 x the committed real half-split sd of that statistic --
          NOT the bare ordinal. Seed passes iff the margin condition holds;
          gate passes iff >= 4 of 5 gate seeds pass. Under this MARGIN reading
          an epsilon-tilt candidate (+0.001/band) FAILS though it passes the
          bare ordinal (see degenerate_candidates).
        anchor_statistic_pins:
          candidate_panel_split: >-
            scored per gate seed on the candidate's simulated side-A holdout
            (NOT re-split into 100 halves; the 100-half floor is the REAL-data
            margin basis, computed once at floor-build time).
          draws_enter: >-
            via rbar (the K=20 mean rate), the same basis as the internal
            cells; NOT per-draw-any-fails and NOT a single draw.
          margin_basis: >-
            MARGIN_K=3 x the committed real half-split sd (half_split_floor
            .min_gap.sd for prevalence age-shape; half_split_floor.share.sd for
            conversion-exit dominance) -- the sd is a fixed real-data constant,
            not recomputed on the candidate.
          conjunction: margin condition per gate seed AND >= 4 of 5 seeds
        conjunction: >-
          seed passes iff every gated cell holds (internal |ln| tolerance AND
          anchor margin); the gate passes iff >= 4 of 5 gate seeds pass.
          Report-only cells and the SSA levels are published, never gated.
        fresh_run_artifact_schema:
          applies_to: >-
            a fresh candidate one-shot run registered AFTER this gate_m4 lock;
            NEVER this floor build, which measures the real-vs-real half-vs-half
            null (no simulation, no draws).
          per_draw_per_cell_rates:
            required: true
            shape: [20, 8, 5]
            shape_dims: K_draws x gated_internal_cells x gate_seeds
            rule: >-
              commit every draw's per-cell rate r[k, cell, s] for all K=20
              draws (default_rng(5200 + k), k=0..19), all 8 gated INTERNAL
              cells, and all 5 gate seeds -- so rbar_candidate,s recomputes
              cell-by-cell and |ln(rbar / rate_a)| is independently auditable,
              not taken on trust.
          undefined_draw_rule:
            required: true
            pre_specified: true
            rule: >-
              if any gated cell's rate is UNDEFINED on any draw (empty
              simulated denominator), the RUN IS INVALIDATED and must be
              re-registered and re-run. No draw may be dropped, skipped,
              substituted, or re-rolled; rbar is always the mean over ALL K
              registered draws.
          per_draw_dispersion_disclosure:
            required: true
            gated: false
            report_only: true
            commit:
              per_cell_per_draw_sd: >-
                the sd across the K=20 draws of each gated cell's rate, per
                gated cell per gate seed.
              max_per_draw_abs_ln_per_cell: >-
                the maximum over the K=20 draws of |ln(r[k, cell, s] /
                rate_a,s)| per gated cell per gate seed.
            note: >-
              REPORT-ONLY: no dispersion cap gates the run; the disclosure lets
              a referee see whether a passing 20-draw mean conceals a wild
              individual draw.
        faithful_candidate_oc:
          n_gated_internal_cells: 8
          p_seed_pass: 0.9408
          p_gate_pass_4_of_5: 0.9689
          basis_note: >-
            Independence-approx normal OC on the DRAW-NOISE-FREE half-normal
            basis (a faithful candidate's per-internal-cell score ~
            half-normal(realized_sigma); cell pass = 2*Phi(tolerance/sigma)-1;
            seed pass = product over the 8 gated internal cells; gate = P(>=4
            of 5) = p^5 + 5 p^4 (1-p)). The mean-over-K=20-draws estimator
            SHARES that basis, so the OC is ACHIEVABLE; under a SINGLE-draw
            estimator it would be UNACHIEVABLE. Bound to the floor's
            faithful_candidate_oc by tests/test_gates_derivations.py.
          oc_vs_precedent: >-
            flip-note 2: 0.9689 is AT OR ABOVE the 2a/2b/2c precedent band
