            (within-couple rank ~0.4928, literature-scale sorting); the round-1
            career-sum AIME proxy correlated only ~0.1194 cross-sex because
            cross-sex tercile pooling halves it (within-sex rank 0.2165) and the
            observed-positive-years count anti-correlates within couples
