        external_anchor_report:
          # flip-note 2 / round-1 finding F: the concept-decomposed ACS/CPS
          # shape/ratio anchor is bundled in THIS flip PR, before
          # ratification -- REPORTED, never a level gate. Built by
          # scripts/gate2b_anchor_decomposition.py from the FROZEN floor's
          # reference_moments and the sha-pinned Census/CPS files in
          # data/external/; it moves no floor value (no calibration).
          run: runs/gate2b_anchor_v1.json
          reported_anchor_not_gated: true
          status: bundled_before_flip
          census_sources:
            - data/external/census_household_size_2023.json
            - data/external/census_living_arrangements_2023.json
            - data/external/census_multigenerational_2020.json
          concept_delta: >-
            The PSID FAMILY UNIT is narrower than the Census HOUSEHOLD (PSID
            splits subfamilies), so the levels are not directly comparable --
            the household analogue of the person-vs-couple x denominator
            decomposition tranche 2a applied to the crude marriage rate. The
            anchor NAMES, per family: household-vs-person weighting (hh_size,
            multigen), family-unit fragmentation (all), the spouse-OR-partner
            inclusion of PSID codes 20/22 (coresident_spouse), the
            child-of-householder vs any-coresident-parent gap and the 15-24
            age-floor / 35-64 band-aggregation deltas (coresident_parent),
            and the grandparent-side vs grandchild-side denominator
            (coresident_grandchild). After the partner-inclusion concept
            factor the coresident_spouse residuals land near 1 -- the 2a
            named-denominator-delta bullseye.
          multigen_bridge: >-
            multigen is now Census B11017 (>=3 distinct generations after
            fixes B/C), so it maps to ACS table B11017 directly; the span>=2
            predecessor would have embedded a 14.7% first-year-cohabitor
            artifact and 30.8% skipped-generation households B11017 excludes.
          transitions_note: >-
            flip-note 4: parental_home_exit / spousal_loss / multigen_entry /
            multigen_exit are flows with no cross-sectional Census level; the
            floor's report-only era_slices cover the stock families, and
            per-era transition rates are deferred (not required at this
            round).
