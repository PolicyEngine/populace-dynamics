      pass_rule: >-
        Proposed per-cell rule for a FRESHLY REGISTERED gate-2 run (never a
        committed one). Every gated cell's score becomes
        |ln(rbar_candidate,s / rate_a,s)| with rbar the mean over K = 20
        pre-registered draws (5200 + k) of the cell rate on the seed-s
        holdout; the reference rate_a,s, the tolerances, the 46-cell
        membership, and the conjunction are inherited UNCHANGED from the
        locked block: seed s passes iff every one of the 46 gated cells
        holds |ln(rbar / rate_a)| <= its locked tolerance at seed s, and the
        gate passes iff >= 4 of 5 gate seeds pass. Only the candidate
        statistic (one draw -> 20-draw mean rate) changes; report-only cells
        and external anchors stay report-only. Only a run registered AFTER
        ratification is scored this way (no_self_rescue).
