            earnings_axis: >-
              the per-year mean NAWI-indexed positive-year earnings (fix C),
              the both-axis selection applied to the SIMULATED careers: a
              couple enters only where BOTH partners are admitted (age-60
              indexing year in the NAWI series and >= MIN_EARNINGS_YEARS
