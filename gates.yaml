              limitation: the 20-29 PSID share is ~5x the Table 19 share; deltas
              1-3 -- definition, population AND severity). The co-monotone RISE
              across the bridged bands is level-invariant, so those deltas do
              not touch it. The 60-FRA band is REPORT-ONLY (delta 4, transience:
