          certifies: >-
            the marriage x earnings JOINT processes on the per-year earnings
            axis -- the own x spouse assortative-mating contingency, the
            earnings-conditional first-marriage and remarriage hazards, the
            placebo-detrended around-event earnings dynamics, and the
