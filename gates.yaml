            guard). Which cells demote is DERIVED from the floor's cell_stability,
            never hand-picked. W1 declares NO coverage-recovery aggregates.
          aggregations: {}
          demoted_and_report_only: >-
            52 family-A cells are report-only, ALL by the floor's OWN machine
            reason: 44 tolerance_above_t_max, 5 floor_max_exceeds_tolerance
            (the W1 heavy-tail guard -- weight-concentrated cells whose 100-seed
            max exceeds mean+4*sd), 2 below_20_events, 1 undefined_on_some_seed.
