              spousal / survivor benefit LEVELS in GENERATED panels -- earnings
              sharing, the spousal amount, the survivor 75% (locked 2a map
              2c_marriage_earnings_joint.required_for: "spousal / survivor
              benefit LEVELS ... depend on the marriage x earnings joint for
              the benefit level, distinct from 2a's eligibility timing"). A 2c
              PASS certifies the GENERATED who-marries-whom-by-earnings side
              those levels key on.
            - >-
              the joint earnings x marital processes in generated panels (locked
              2a map: "who marries whom", locked provision_class_coverage
              .marriage_x_earnings_joint).
          does_not_support:
            - >-
              survivor / spousal ELIGIBILITY TIMING -- that is tranche 2a's
              marital-transition surface (certified under 2a), distinct from the
              earnings-level joint 2c certifies.
            - >-
              household-UNIT poverty / composition rows -- those require tranche
              2b (MX23REL household composition). And OWN-RECORD benefit levels
              (bend points, the PIA formula) rest on gate 1 (earnings) + the
              statutory-formula oracle (#78/#80), OUTSIDE 2a / 2b / 2c.
          consistent_with_locked_2a_map: >-
            the locked gate_2.thresholds.scope.certification_scope.tranches
            .2c_marriage_earnings_joint.required_for entry (spousal/survivor
            LEVELS; who marries whom) is the 2a side of this map; this block is
            the 2c side, DERIVED from it, not a rewrite of it.
