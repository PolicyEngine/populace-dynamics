          reported_anchor_not_gated: true
          status: bundled_before_flip
          published_sources:
            - data/external/schwartz_2010_spousal_earnings_correlation.json
            - data/external/greenwood_2014_assortative_mating.json
          concept_delta: >-
            The couple earnings axis is the PSID-observed mean indexed
            positive-year earnings (per-year earnings-capacity, income years
            1968-2022, cohort-graded truncation; fix C), NOT the true SSA
            covered-earnings AIME, so LEVELS are not level-comparable to
            SSA/OCACT tabulations. The anchor bridges the per-year within-couple
            rank sorting (~0.49) to the published series -- Schwartz (2010) CPS
            ASEC spouses'-earnings Pearson (dual-earner .08 -> .23; the
            concept-matched both-positive row) and Greenwood et al. (2014)
            educational relative-sum-of-diagonals delta (~1.6-2.0). Named
            deltas: rank vs Pearson, per-year capacity vs annual earnings, the
            selected truncated-support both-positive universe, education vs
            earnings. Our per-year rank 0.4928 sits ABOVE the annual-earnings
            Pearson and our contingency delta 1.3689 BELOW the educational
            delta, both as the concept deltas predict -- direction validated,
            no calibration.
          within_sex_rank_implementation_delta: >-
            flip-note 6: the committed within-sex AIME-proxy rank rho is 0.2165
            (assortative_decomposition.within_sex_aime_proxy_rank_spearman); the
            round-1 referee quoted 0.2133 -- a within-sex ranking implementation
            delta on the same construct (tie-handling / rank convention),
            report-only, decomposition-internal, immaterial to any gate. The
            flip carries the committed 0.2165.
          calibration: none -- the bridge names concept deltas, moves no floor value
