# Pre-registered gate definitions for Populace dynamics.
#
# Pre-registration contract: the battery, views, holdout protocol, and
# baselines below are fixed BEFORE any transition model runs against
# them. Numeric thresholds carry `locked: false` until they are set —
# they must lock before the first model run, and once locked they
# change only through a public amendment noted in this file's history.
# Every gate's evidence publishes whether it passes or fails
# (paper sec. 5, populace.dev/papers/dynamics).

version: 0.1.0

holdout_protocol:
  unit: person # splits are person-disjoint; windows never leak
  fraction: 0.2
  paired_across_methods: true # same split for every candidate
  seeds: [0, 1, 2, 3, 4]

noise_floor:
  method: half_vs_half # person-disjoint halves of one holdout
  reference: populace_dynamics.harness.panel.noise_floor
  candidate_context: >-
    Thresholds cite a second floor at deployment scale: two disjoint
    20%-of-persons real samples scored against each other
    (runs/noise_floor_psid_family_ctx20_9822.json). C2ST and the
    tail block run uncapped, so their sampling noise at the
    protocol's ~20%-holdout scale exceeds the full-panel
    half-vs-half floor's; thresholds that ignored this were the
    pre-lock review's central finding (pull request 33 review,
    2026-07-05).

views:
  # Amended pre-lock 2026-07-04: the individual file carries no
  # uniform labor_income series (verified against its labels); the
  # implemented views use its total-annual-earnings recode, reference
  # years 1997/1999/2001, prime age 25-59. Family-file earnings views
  # extend coverage once those products are staged.
  # Amended pre-lock 2026-07-05: family files staged; the primary
  # earnings view now uses head/spouse labor income attached to
  # persons (reference years 1998-2022 biennial), superseding the
  # three-wave individual recode view, which stays as a secondary
  # check.
  # Amended pre-lock 2026-07-05 (pull request 33 review): the runs
  # view moves to the family panel too — the individual three-wave
  # product supports at most one window-3 window per person, while
  # the family panel supports 81,654 — and gate 1 locks geometry on
  # it, because window-2 geometry cannot see chained-model
  # persistence understatement (a chained one-period clone matches
  # the pairs view by construction).
  psid_family_earnings_pairs:
    loader: populace_dynamics.data.family.family_earnings_panel
    value_columns: [earnings]
    covariate_columns: [age]
    age_range: [25, 59]
    period_range: [1998, 2022]
    window: 2
    period_step: 2
    noise_floor_run: runs/noise_floor_psid_family_9822.json
    candidate_context_floor_run: runs/noise_floor_psid_family_ctx20_9822.json
  psid_family_earnings_runs:
    loader: populace_dynamics.data.family.family_earnings_panel
    value_columns: [earnings]
    covariate_columns: [age]
    age_range: [25, 59]
    period_range: [1998, 2022]
    window: 3 # spans two consecutive transitions
    period_step: 2
    noise_floor_run: runs/noise_floor_psid_family_runs_9822.json
    candidate_context_floor_run: runs/noise_floor_psid_family_runs_ctx20_9822.json
  psid_earnings_pairs:
    product: ind2023er
    loader: populace_dynamics.data.panels.individual_earnings_panel
    value_columns: [earnings]
    covariate_columns: [age]
    age_range: [25, 59]
    window: 2
    period_step: 2 # PSID interviews biennial since 1997
    noise_floor_run: runs/noise_floor_psid_earnings_9701.json
  psid_earnings_runs:
    # Secondary since 2026-07-05: superseded for gating by
    # psid_family_earnings_runs (this three-wave product yields at
    # most one window per person); stays registered as a check.
    product: ind2023er
    loader: populace_dynamics.data.panels.individual_earnings_panel
    value_columns: [earnings]
    covariate_columns: [age]
    age_range: [25, 59]
    window: 3
    period_step: 2

geometry_blocks:
  - energy_distance # strictly proper; weight-sensitive
  - prdc # coverage is reweighting-invariant
  - c2st_auc # omnibus distinguishability
  - tail # w1_over_sd, q90_ratio, q99_ratio on targets

moment_battery:
  mobility_matrix:
    horizons: [1, 2]
    n_bins: 5
    zero_bin: true
  change_moments:
    moments: [mean, sd, skew, kurtosis]
    by: [cohort]
    log: true
  autocorrelation:
    lags: [1, 2, 5]
    log: true
  age_profile:
    quantiles: [0.1, 0.5, 0.9]
    by: [cohort]
  zero_spells: {}
  transition_rates:
    state: marital_status
    product: mh85_23

gates:
  gate_1:
    name: earnings-history credibility
    description: >-
      The baseline backcast earnings process (populace-fit regime-gated
      chained weighted QRF) scores against held-out PSID panel moments
      and geometry blocks, judged relative to the same-panel noise
      floor, before any family or benefit output ships.
    baseline: populace-fit chained weighted QRF
    thresholds:
      # Proposed 2026-07-05; amended the same day per the pre-lock
      # review (pull request 33, comment of 2026-07-05) before
      # ratification. The original proposal's rationale did not
      # derive its own numbers, and its floor was measured at ~51k
      # windows per side while the protocol scores ~20k-window
      # holdouts. Locks on maintainer ratification of this pull
      # request; models run only after the merge that flips locked.
      #
      # Round-2 amendment (2026-07-05, review comment 4885102386):
      # the round-1 amendment had calibrated the runs view against
      # the full-panel half-vs-half floor — the same wrong-scale
      # defect round 1 rejected for the pairs view. The runs
      # thresholds now derive from a committed deployment-scale runs
      # floor; q90 is locked (it was computed but ungated); every
      # derivation is machine-checkable
      # (tests/test_gates_derivations.py asserts each locked
      # threshold equals floor mean + k * floor sd as stated below).
      #
      # Geometry thresholds derive from two committed
      # deployment-scale floor artifacts (candidate-context
      # construction, real vs real at ~20%-of-persons scale, seeds
      # 0-4; stats are mean +/- sd):
      # - runs/noise_floor_psid_family_ctx20_9822.json (window-2
      #   pairs): c2st 0.5108+/-0.0046, energy 0.0034+/-0.0025,
      #   coverage 0.9577+/-0.0059, q99 1.0428+/-0.1338, q90
      #   1.0064+/-0.0480, w1/sd 0.0349+/-0.0131.
      # - runs/noise_floor_psid_family_runs_ctx20_9822.json
      #   (window-3 runs): c2st 0.5092+/-0.0072, coverage
      #   0.9507+/-0.0125.
      # The machine-checked derivations live in each view's
      # `derivations` block below. The k values under 2 pair with
      # the 4-of-5-seed rule: a faithful candidate that clips one
      # seed on a tail metric still passes; the demonstrated broken
      # candidates fail 5/5.
      # Construction note: the five ctx20 seeds draw overlapping
      # person sets (Jaccard ~0.11, ~71% reuse across seeds). The
      # round-2 review measured the effect: the disjoint-draw c2st
      # sd is 0.0058, against which the pairs c2st lock still sits
      # at +3.3 sd; the committed energy sd is ~8x the
      # independent-draw sd, so that margin is conservative (wider
      # than pure noise requires).
      # Bite, demonstrated in the reviews at protocol scale: a
      # marginals-matched shuffled-dynamics candidate scores
      # coverage 0.881-0.903 (fails 0.93 on 5/5 seeds); a candidate
      # understating one-step correlation by 18% scores c2st
      # 0.548-0.557 (fails 0.53 on 5/5); a faithful redraw of the
      # true process passes 5/5 under the full seed-level
      # conjunction across both views (pairs c2st <= 0.511, runs
      # c2st <= 0.512).
      # Persistence-failure attribution (round-2 finding 2): a
      # chained one-period clone passes every window-2 threshold by
      # construction (the pairs view is the object it fits), and at
      # deployment scale it straddles the runs c2st threshold
      # (clone 0.533-0.542 vs 0.54), so the runs view is a
      # SUPPORTING check, not the guard. The pre-registered guards
      # for chained-model persistence understatement are the
      # battery's autocorrelation and spell tolerances: clone 10yr
      # autocorr 0.207 vs reference 0.539 (gap 0.332, 4.7x the 0.07
      # tolerance) and 4yr 0.533 vs 0.657 (gap 0.124, 2.1x the 0.06
      # tolerance), each failing on 5/5 seeds.
      locked: true
      ratified: 2026-07-05 by maintainer merge of pull request 33
      # (commit e0c4eb95). Locked thresholds change only through a
      # public amendment noted in this file's history.
      views:
        psid_family_earnings_pairs:
          geometry:
            c2st_auc_max: 0.53
            energy_distance_max: 0.008
            prdc_coverage_min: 0.93
            q99_ratio_range: [0.70, 1.40]
            q90_ratio_range: [0.85, 1.15]
            w1_over_sd_max: 0.06
          derivations:
            floor_run: runs/noise_floor_psid_family_ctx20_9822.json
            rules:
              c2st_auc_max: { key: c2st_auc, k: 4.2 }
              energy_distance_max:
                { key: energy_distance, k: 1.8, rounding: 3 }
              prdc_coverage_min: { key: prdc_coverage, k: -4.7 }
              q99_ratio_range:
                { key: q99_ratio.earnings_t1, k: [-2.56, 2.7] }
              q90_ratio_range:
                { key: q90_ratio.earnings_t1, k: [-3.3, 3.0] }
              w1_over_sd_max: { key: w1_over_sd.earnings_t1, k: 1.9 }
        psid_family_earnings_runs:
          geometry:
            c2st_auc_max: 0.54
            prdc_coverage_min: 0.90
          derivations:
            floor_run: runs/noise_floor_psid_family_runs_ctx20_9822.json
            rules:
              c2st_auc_max: { key: c2st_auc, k: 4.3 }
              prdc_coverage_min: { key: prdc_coverage, k: -4.0 }
      battery:
        # Absolute bands around the committed reference values in
        # runs/noise_floor_psid_family_9822.json (battery_reference).
        # Definitions pinned at lock:
        # - autocorr_log_*: populace_dynamics.harness.moments.
        #   autocorrelation on log earnings among positives; lags
        #   1/2/5 of the biennial panel = 2/4/10 years.
        # - mobility_diagonal: unweighted mean over all six
        #   origin-diagonal cells of the horizon-1 mobility matrix
        #   (five weighted quintile bins plus the zero bin —
        #   moments.mobility_matrix, zero_bin true). The zero bin is
        #   included: the positive-bins-only reading gives 0.5847,
        #   not the committed 0.604052.
        # - zero_persistence and exit_rate satisfy the identity
        #   zero_persistence = 1 - exit_rate; the two lines lock ONE
        #   constraint, kept separately for reporting.
        # - mean_spell_length: moments.zero_spells mean length in
        #   waves — the battery's only direct long-spell statistic.
        # Holdout-scale measurement error (review, finding 5c):
        # perfect-candidate gaps at single-20%-holdout scale consume
        # up to ~61% of the mobility band (small-sample attenuation,
        # systematically negative), ~57% of exit/zero-persistence,
        # ~38% of entry. Accepted at lock; the candidate-panel-size
        # pin in the protocol keeps that regime fixed.
        autocorr_log_2yr_tolerance: 0.05
        autocorr_log_4yr_tolerance: 0.06
        autocorr_log_10yr_tolerance: 0.07
        mobility_diagonal_tolerance: 0.05
        zero_persistence_tolerance: 0.05
        entry_rate_tolerance: 0.02
        exit_rate_tolerance: 0.05
        mean_spell_length_tolerance: 0.25
      reported_not_gated:
        # Registered battery families with no committed reference at
        # gate 1: published with every gate run, gated no earlier
        # than a later gate with committed references.
        - change_moments sd, skew, kurtosis
        - age_profile quantiles
        - mobility_matrix horizon 2
      protocol:
        seeds: [0, 1, 2, 3, 4]
        split: >-
          Apply the view filter first (age 25-59, reference years
          1998-2022, positive weights), then
          populace_dynamics.harness.panel.split_panel_by_person(
          panel, "person_id", fraction=0.2, seed=s); the drawn 20%
          of persons is seed s's holdout.
        candidate: >-
          Refit per seed on the 80% complement; holdout persons are
          excluded from all fitting, tuning, and calibration. The
          candidate emits trajectories for exactly the holdout
          persons on their observed periods, which pins the
          candidate panel to holdout scale — the scale of the ctx20
          floor and of the battery measurement-error figures above.
        scoring: >-
          populace_dynamics.harness.panel.panel_scorecard(candidate,
          holdout, view, seed=s) for each locked view. Battery
          statistics are computed on the candidate panel per seed
          and compared to the committed battery_reference values —
          not to a pooled holdout, which the harness does not
          define (the five 20% draws overlap).
        pass_rule: >-
          Seed-level conjunction. Seed s passes geometry iff every
          locked threshold on every locked view holds at seed s;
          seed s passes the battery iff every locked tolerance
          holds at seed s. The gate passes iff at least 4 of 5
          seeds pass geometry and at least 4 of 5 seeds pass the
          battery.
    amendment_proposed:
      # PUBLIC AMENDMENT PROPOSAL under this file's amendment rule
      # (header: "locked thresholds change only through a public
      # amendment noted in this file's history"). This subsection is
      # the amendment OBJECT: it PROPOSES changes and changes NOTHING.
      # The locked `thresholds` block above is untouched (locked: true
      # stays; every locked value is byte-identical). No model reads
      # this subsection; the harness scores only the locked block.
      #
      # Status: proposed, pending (1) a FRESH adversarial referee round
      # run against this proposal and (2) maintainer RATIFICATION by
      # merge. Until that merge, this proposal is inert. Ratification
      # would move these proposed lines into the locked block through a
      # follow-up that flips them live, exactly as PR #33/#39 did for
      # the original lock.
      #
      # Evidence chain (all reported-not-gated; none touched a gate):
      # - PR #54 (C2ST forensics): at the locked pairs-view c2st ~0.547
      #   the two best candidates fail through STRUCTURALLY DIFFERENT
      #   defects at the same AUC; the classifier reads a window-3
      #   texture coordinate, not a benefit-space divergence.
      # - PR #55 (candidate 7, the ninth run): FAIL, geometry 2/5 and
      #   battery 2/5; the best classifier scores of any candidate (first
      #   to pull pairs-view c2st under threshold on all five seeds), but
      #   the runs-view c2st and 10-year autocorrelation each clip 3/5.
      # - PR #56 (downstream relevance): the candidate-7 residual mapped
      #   into PIA-proxy benefit space. Central benefit gaps are small
      #   (mean +1.85%, median +1.02%, both well inside the +/-5%
      #   criterion) and the weighted KS 0.025 sits INSIDE the 0.028
      #   real-vs-real noise floor; the ONE material miss is the Q0
      #   zero-anchor-earnings subgroup at +9.30% (the progressive PIA
      #   formula weights that corner most). runs/pia_proxy_floor_9822
      #   .json is the real-vs-real anchor at deployment scale this
      #   proposal cites.
      #
      # The two proposed changes below are a joint RECALIBRATION toward
      # decision-relevance: move one benefit-immaterial classifier
      # threshold to reported-not-gated, and ADD a benefit-space block
      # that gates exactly where the evidence says the residual bites
      # (Q0). Net strictness where it matters INCREASES; this is not a
      # relaxation. See each change's rationale.
      status: proposed_pending_referee_round_and_ratification
      amendment_rule_reference: >-
        gates.yaml header ("Numeric thresholds ... change only through
        a public amendment noted in this file's history") and CLAUDE.md
        ("gate-1 thresholds are locked ... and change only through a
        public amendment plus a fresh referee round").
      evidence_chain:
        forensics_pr: 54
        candidate_7_run_pr: 55
        downstream_relevance_pr: 56
        model_registry_issue: 42
      changes:
        - id: 1
          title: >-
            runs-view c2st_auc_max moves from gated to
            reported-not-gated
          type: move_to_reported_not_gated
          target:
            view: psid_family_earnings_runs
            metric: c2st_auc_max
            currently_locked_value: 0.54
          proposed: reported_not_gated
          rationale: >-
            The window-3 runs-view c2st is the single threshold on which
            candidate 7 clips (3/5 seeds), yet PR #56 shows that residual
            is benefit-immaterial: pushed through the PIA-proxy the
            candidate's KS (0.025) sits INSIDE the real-vs-real noise
            floor (0.028) and its central percent gaps (mean +1.85%,
            median +1.02%) are well within the +/-5% criterion. PR #54
            attributes the runs-view signal to a window-3 TEXTURE
            coordinate (a two-transition persistence-shape residual), not
            a distributional divergence that reaches benefits. Gating a
            benefit-immaterial texture residual makes the gate reject
            faithful-in-benefit-space candidates for a defect that does
            not propagate. It moves to reported-not-gated (still
            published every run); the runs view was already annotated in
            the lock as a SUPPORTING check (a chained one-period clone
            straddles it), and the pre-registered guard for chained-model
            persistence understatement is the battery's autocorrelation
            and spell tolerances, which stay gated and fail such clones
            5/5. The pairs-view c2st stays gated.
        - id: 2
          title: >-
            add a gated benefit_space block scored on the candidate
            PIA-proxy panels
          type: add_gated_block
          rationale: >-
            The population-view geometry does not see the one place the
            candidate-7 residual is benefit-material: the Q0
            zero-anchor-earnings subgroup, +9.30% in PIA-proxy space (PR
            #56), which the progressive 415(a) formula (90% replacement
            below the first bend point) weights most. This block ADDS a
            gate exactly there. It is recalibration toward
            decision-relevance, NOT relaxation: candidate 7 passes every
            population-view pairs threshold on all five seeds yet FAILS
            this block on Q0, so the amendment nets MORE strictness where
            the evidence says it matters. The percent bands are this
            amendment's OWN proposal-time criterion (see
            a_priori_source — the referee round corrected an earlier
            misattribution to the paper); the KS band alone is derived
            from the committed real-vs-real anchor (see derivations),
            matching how the locked geometry thresholds derive from
            their floors.
          a_priori_source: >-
            The +/-5% percent bands are ADOPTED BY THIS AMENDMENT at
            proposal time (2026-07-06), before any candidate was scored
            against them. Provenance, stated exactly: the 5% figure
            originates in the project's DRAFT Phase-1 acceptance tables
            ("AIME distribution for retired workers ... within 5
            percent on key percentiles",
            docs/operationalizing-longitudinal-construction.md and
            docs/evaluation-and-model-selection.md), which are draft
            design documents in AIME units; the paper itself carries no
            such criterion (an earlier draft of this subsection
            misattributed it — corrected per the amendment referee
            round, PR #57 review). Because the PIA formula is concave,
            a 5% band in PIA-proxy space is STRICTER than the draft
            tables' 5% in AIME space (roughly 7-9% AIME-equivalent at
            the 2022 bend points), so adopting 5% here tightens rather
            than relaxes the draft figure. The committed anchor shows
            reality inside 2.7% on every gated statistic of this
            block.
          demotion_disclosure: >-
            Moving the runs-view c2st from gated to reported changes
            the GEOMETRY-block verdicts of four of the nine committed
            runs, disclosed here in full (per the amendment referee
            round): the baseline (PR #40) geometry 0/5 -> 5/5 (its only
            geometry failures were runs-view c2st), candidate 2 (PR
            #43) 3/5 -> 5/5, candidate 3 (PR #44) 4/5 (seed 3 also
            fails pairs c2st, which stays gated), candidate 7 (PR #55)
            2/5 -> 5/5. NO committed run's overall gate-1 verdict
            flips to pass: every one of the four still fails the
            battery (baseline/c2/c3 on the autocorrelation ladder;
            candidate 7 on the 10-year rung 3/5) and, under this
            amendment, the benefit-space block (referee-verified:
            baseline pooled Q0 +19.0, candidate 7 +9.3, vs reality
            2.66 and the 5 band). Guard concentration, acknowledged:
            after the demotion the anti-persistence duty rests on the
            battery autocorrelation bands plus the pooled-Q0 benefit
            band; across all nine committed runs the battery ladder
            alone failed every persistence-broken candidate on 5/5
            seeds, so the duty is carried by the block with the
            strongest demonstrated bite.
          anchor_artifact: runs/pia_proxy_floor_9822.json
          scored_on: >-
            the pairs-view candidate PIA-proxy panels per gate seed:
            each seed's holdout persons pushed through the pinned
            PIA-proxy functional (scripts/build_downstream_relevance.py),
            candidate vs real, anchor-weighted; Q0 = zero anchor earnings
            (seed-stable full-panel quintile edges).
          metrics:
            abs_mean_pct_diff_max:
              value: 5
              scope: per_seed
              a_priori_source: amendment_5pct_criterion
            abs_median_pct_diff_max:
              value: 5
              scope: per_seed
              a_priori_source: amendment_5pct_criterion
            decile_pct_diff_max:
              value: 5
              scope: per_seed
              deciles_gated: [d3, d4, d5, d6, d7, d8, d9]
              a_priori_source: amendment_5pct_criterion
            weighted_ks_max:
              value: 0.0599
              scope: per_seed
            abs_q0_mean_pct_diff_max:
              value: 5
              scope: pooled_across_seeds
              a_priori_source: amendment_5pct_criterion
          reported_not_gated:
            - d1  # bottom decile: near-zero PIA-proxy denominator
            - d2  # second decile: same denominator fragility (see note)
          derivations:
            # Machine-checkable, exactly like the locked geometry
            # derivations: the KS band equals the committed real-vs-real
            # anchor's mean + k*sd (tests/test_gates_derivations.py binds
            # this). Only KS is floor-derived; the percent bands are the
            # a-priori paper criterion (a_priori_source), not derived.
            anchor_run: runs/pia_proxy_floor_9822.json
            rules:
              weighted_ks_max:
                key: ks_distance
                k: 4
                rounding: 4
          reported_not_gated_rationale: >-
            d1 and d2 are denominator-fragile: at the bottom the
            PIA-proxy is ~$290-500/mo, so ~$80-145 absolute differences
            read as huge percents. The committed anchor
            (runs/pia_proxy_floor_9822.json, decile_seeds_clipping_5pct)
            shows the REAL-VS-REAL floor itself exceeds the +/-5% band on
            5/5 seeds at d1 and 3/5 at d2 -- gating either would reject
            reality. d1 was already flagged denominator-fragile in PR
            #56; the new anchor extends the same finding to d2. d3-d9,
            whose real-vs-real floor clips 0/5, are gated.
          q0_gate_basis: >-
            The Q0 gate is on the POOLED (across-seed mean) absolute
            gap, not per-seed. The Q0 subgroup is ~900 persons/side with
            near-zero denominators, so the per-seed real-vs-real Q0 floor
            is noisy (reaches ~12.8% on one seed) and a per-seed 5% gate
            would reject reality; the across-seed mean cancels that noise
            (real is unbiased: |pooled| ~2.7%,
            pooled_abs_q0_mean_pct_diff in the anchor) and cleanly
            separates real from the candidate-7 residual (+9.30%). The
            5% band is the a-priori paper criterion.
          candidate_7_would_still_fail: >-
            Under this proposed block candidate 7 FAILS: it passes the
            seed-level central/decile/KS gates on all five seeds (its
            benefit-space central gaps and KS are inside the noise
            floor), but its pooled Q0 gap is +9.30% > 5. Adopting the
            amendment does not retroactively pass the ninth run.
      pass_rule: >-
        Proposed benefit_space verdict, folded into the existing
        seed-level geometry conjunction: seed s passes benefit_space
        iff every per-seed gated metric (abs mean %, abs median %, each
        gated decile d3-d9 %, weighted KS) holds at seed s, AND the
        pooled Q0 gate (abs pooled-mean Q0 % <= 5) holds across seeds;
        the block passes iff at least 4 of 5 seeds pass the per-seed
        metrics AND the pooled Q0 gate holds. Combined with change 1, a
        seed passes gate-1 geometry iff every remaining locked geometry
        threshold AND every per-seed benefit_space metric hold at that
        seed; the gate passes iff >= 4 of 5 seeds pass geometry, >= 4
        of 5 pass the battery, and the pooled Q0 gate holds.
      validation_note: >-
        Discriminator check on committed evidence (real-vs-real anchor
        runs/pia_proxy_floor_9822.json vs candidate-7
        runs/downstream_relevance_c7_v1.json): real-vs-real PASSES this
        block (seed-level 5/5; pooled |Q0| 2.66% <= 5) and candidate 7
        FAILS it (pooled |Q0| 9.30% > 5). A proposed gate that passes
        reality and fails the ninth run is a valid discriminator; a
        fresh referee round must confirm this.
  gate_2:
    name: family and benefit outputs
    description: >-
      Marriage, divorce, fertility, and household-composition
      transitions score against mh85_23, cah85_23, and MX23REL
      holdouts; benefit formulas earn per-rule "computes exactly"
      status.
    thresholds:
      locked: false
  gate_3:
    name: forward projection
    description: >-
      Tier-2 near-term components resolve against administrative
      publications on named resolution rules; retrodiction backtests
      grade as pseudo-vintage with a published deviation log.
    thresholds:
      locked: false
