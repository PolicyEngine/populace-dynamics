          The gate's family-A content is thin in two families (finding 10v):
          the marital family gates 13 of 50 cells (the rest demoted at the power
          cap -- widowed / divorced / separated are report-only almost everywhere),
          and lower-tail dispersion gates 1 of 8 cells (earnings_p50p10.25-34|female).
          Named here and in the PR text, not left to be discovered from the
          partition.
        regenerated_surface_note: >-
          the family-A candidate surface is PINNED in protocol.fresh_run_artifact_schema.regenerated_surface:
          every scored column must be RE-GENERATED by the deployed generators
          on each of the K=20 draws; copying a scored column is NON-CONFORMANT
          (referee finding 3 / fix B).
