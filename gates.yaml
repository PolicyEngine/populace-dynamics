          "conversion_exit.retirement_dominant|female":
            surface: a_conversion_exit_vs_t50
            statistic: >-
              weighted share of non-death disability exits at ages 60-67 that go
              to retired (vs return-to-work); retirement DOMINATES (> 0.5) with
              margin.
            anchor_source: Table 50 (worker terminations by reason, 2023)
            margin_basis: half_split_floor.share.sd
            real_half_split_sd: 0.043471378797961174
            psid_dominance_margin: 0.2085378095352508
            margin_sigma_units: 4.797
            gate_rule:
              candidate_condition: >-
                the candidate's per-gate-seed simulated retirement-exit share
                exceeds 0.5 by margin >= MARGIN_K=3 x real_half_split_sd (i.e.
                the dominance margin > 3 sigma); gate passes iff >= 4 of 5 gate
