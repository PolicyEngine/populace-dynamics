          train_copy: {max_score_over_tolerance: 0.8089, max_ratio_cell: [marital_share.married.35-44|female,
              2], passes_4_of_5: true, defence: 'procedural (registration +
              holdout exclusion + no_self_rescue), NOT the cell set'}
          identity_candidate:
            candidate: >-
              the identity map: the candidate emits the frame's OWN scored columns
              (age / earnings / A_MARITL / household ids) unchanged, adding
              history around them without RE-GENERATING the scored cross-section.
            score: >-
              0 on every family-A cell, on every seed and every draw
            across_draw_sd: 0.0
            conformance: NON-CONFORMANT
            caught_by: >-
              protocol.fresh_run_artifact_schema.regenerated_surface (copying
              a scored column is non-conformant) + per_draw_dispersion_disclosure.max_per_draw_abs_ln_per_cell
              == 0 (no regeneration -> zero across-draw dispersion). Unlike
              the train-copy (a real attack the registration + holdout + no_self_rescue
              procedure bars), the identity map is the DEFAULT reading of #113's
              'deployment on the panel is transport', so the protocol must STATE
              the regenerated surface -- which it now does.
            certifies: >-
              nothing about the generators (finding 3): a pass under the identity
              map is score-0 by construction. What a CONFORMANT pass certifies
              is that stochastic regeneration through the deployed generators
              does not distort the cross-section beyond the CPS sampling floor.
        heavy_tail_boundary_bootstrap:
          method: >-
            nonparametric bootstrap over each cell's committed 100 half-split
            floor values (B=5000, numpy default_rng(91000)): resample 100 with
            replacement, recompute tolerance round(mean+4*sd,3) and the floor
            max, count P(max <= tolerance). For a heavy-tail DEMOTE this is
            P(re-enter gated); for a GATED cell 1 - it is P(flip out to report-only).
          n_bootstrap: 5000
          seed: 91000
          demote_reentry_prob: {coresident_spouse.25-34|male: 0.761, marital_share.married.55-64|female: 0.718,
            earnings_p90p50.55-61|female: 0.552, earnings_p90p50.25-34|female: 0.461,
            earnings_p90p50.25-34|male: 0.396}
          gated_flipout_prob: {earnings_profile.45-54|male: 0.198, coresident_spouse.55-64|female: 0.161,
