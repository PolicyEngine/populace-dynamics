              the marriage<->divorce FAMILY swap (sexed cells); the .all-only
              residual is defended by the PSID seed-0 reproduction pin
              (verified catch ~22s), not a CI invariant. Recorded as a known,
              bounded shape, not a defect.
            note: >-
              Fix D pins the CANDIDATE-side couple universe and orientation
              the round-1 draft left implicit; the protocol pins draws /
              stream / shape / invalidation.
          faithful_candidate_oc:
            n_gated_cells: 27
            p_seed_pass: 0.9641
            p_gate_pass_4_of_5: 0.988
            basis_note: >-
              Computed on a DRAW-NOISE-FREE half-normal basis (a faithful
              candidate's per-cell score ~ half-normal(realized_sigma), floor
              sigmas only, no simulation-draw term). The mean-over-K=20-draws
              estimator SHARES that basis, so the OC is ACHIEVABLE; under a
              SINGLE-draw estimator it would be UNACHIEVABLE (tranche 2a
              amendment-1 finding 1: one replicate injects ~one extra
              floor-sigma per cell). This 2c build adopts the ratified K=20
              estimator FROM THE START, so the single-draw defect the 2b
              round-1 referee flagged never enters. Bound to the floor's
              faithful_candidate_oc by tests/test_gates_derivations.py.
          fresh_run_artifact_schema:
            applies_to: >-
              a fresh candidate one-shot run registered AFTER this gate_2c
              lock; NEVER the floor build (which measures the real-vs-real
              half-vs-half null, no simulation, no draws).
            per_draw_per_cell_rates:
              required: true
              shape: [20, 27, 5]
              shape_dims: K_draws x gated_cells x gate_seeds
              rule: >-
                commit every draw's per-cell rate r[k, cell, s] for all K=20
                draws (default_rng(5200 + k), k=0..19), all 27 gated cells, and
                all 5 gate seeds -- so rbar_candidate,s recomputes cell-by-cell
                and |ln(rbar / rate_a)| is independently auditable, not taken
                on trust.
            undefined_draw_rule:
              required: true
              pre_specified: true
              rule: >-
                if any gated cell's rate is UNDEFINED on any draw (empty
                simulated denominator), the RUN IS INVALIDATED and must be
                re-registered and re-run. No draw may be dropped, skipped,
                substituted, or re-rolled; rbar is always the mean over ALL K
                registered draws.
            per_draw_dispersion_disclosure:
              required: true
              gated: false
              report_only: true
              commit:
                per_cell_per_draw_sd: >-
                  the sd across the K=20 draws of each gated cell's rate, per
                  gated cell per gate seed.
                max_per_draw_abs_ln_per_cell: >-
                  the maximum over the K=20 draws of |ln(r[k, cell, s] /
                  rate_a,s)| per gated cell per gate seed.
              note: >-
                REPORT-ONLY: no dispersion cap gates the run; the disclosure
                lets a referee see whether a passing 20-draw mean conceals a
                wild individual draw.
        power_cap:
          # Gate a cell only if its stabilised tolerance is tight enough to
          # reject a materially wrong model. Which cells demote is DERIVED
          # from the floor (cell_stability), never hand-picked.
          t_max: ln(1.5)
          rule: >-
            gate-eligible iff defined on every one of the 100 seeds AND >=20
            events on the weaker half of the worst seed AND stabilised
            tolerance <= T_max = ln(1.5). gate-2c declares NO coverage-recovery
            aggregates, so no cell is superseded by a gating aggregate.
          aggregations: {}
          demoted_and_report_only: >-
            22 cells are report-only, all by the floor's OWN machine reason: 16
            carry tolerance_above_t_max (the sparse late-first-marriage /
            remarriage / anti-diagonal-corner cells whose stabilised tolerance
            exceeds ln(1.5)) and 6 carry below_20_events (the 45+ first-marriage
            tercile cells). NO coverage-recovery aggregate is added: fix H(i)
            measured that NO pooled t{o}.35+|sex aggregate is standalone-gateable
            either (tolerances [0.634, 1.265], all above ln(1.5)), so the honest
            reason the sparse cells stay report-only is POWER, not masking.
        governance:
          # The registration / one-shot / amendment machinery reaches gate 2c
          # by inheriting gate 1's, exactly as tranche 2a / 2b do.
          registration: >-
            Pre-registered on issue #42, as every gate-1 / gate-2 candidate
            run. A gate-2c candidate registers its spec, its fitting exclusions
            (the seed-s holdout couples), and its simulation seeds BEFORE
            scoring. Outer runs are one-shot.
          amendment_rules:
            inherits: gate_1
            no_self_rescue: >-
              Inherited verbatim from gate_1.amendment_rules: no candidate's
              committed run verdict changes under a rule proposed after that
              run; a gate rule amendment applies only to runs registered after
              its ratification.
            classifier_version_pin: >-
              Inherited: any version-sensitive scoring component records the
              library version used to derive a floor and to score candidates,
              and the two must match (pe-us revision bf71be3b pins the NAWI /
              wage-base tables the earnings axis indexes on).
            amendments_only_via: >-
              public proposal + adversarial referee round + verification +
              maintainer ratification by merge -- the same ceremony gate 1 and
              tranche 2a / 2b amendments follow.
            description_claims_exactly_the_scored_surface: >-
              This tranche is bound by the standing rule promoted into
              gate_2.governance.amendment_rules (amendment 2): the covers /
              holdout_basis / estimand claim EXACTLY the scored surface -- the
              selected per-year-earnings couple universe on the 1968-2022
              panel, the 27 gated cells, mh85_23 x the gate-1 earnings panel.
              No provision class or holdout is headlined beyond what the cells
              gate.
          candidate_scale: >-
            PINNED to the seed-s holdout half (~50% of couple-graph components,
            side A); the candidate simulates exactly those couples, fixing the
            output scale the floor and tolerances are measured at.
