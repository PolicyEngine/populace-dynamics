            FLOOR the OC must clear, and round-1 endorsed exactly this OC. The
            anchor cells add no draw-noise term (they gate on a >= 3 sigma
            margin the faithful candidate clears by 4.8-12.8 sigma), so the
            internal-cell OC is the binding operating characteristic.
      power_cap:
        # Gate an internal cell only if its stabilised tolerance is tight
        # enough to reject a materially wrong model. Which cells demote is
        # DERIVED from the floor (cell_stability), never hand-picked.
        t_max: ln(1.5)
        rule: >-
          an internal cell is gate-eligible iff defined on every one of the 100
          seeds AND >= 20 events on the weaker half of the worst seed AND its
          stabilised tolerance <= T_max = ln(1.5) at that cell's k (FLOW k=3 /
          STOCK k=4). M4 declares NO coverage-recovery aggregates, so no cell
          is superseded by a gating aggregate.
        aggregations: {}
        demoted_and_report_only: >-
          24 internal cells are report-only, ALL by the floor's OWN machine
          reason tolerance_above_t_max (their stabilised tolerance at their k
          exceeds ln(1.5)) -- there are NO below_20_events demotions (every
          cell clears the 20-event floor; the honest reason the sparse cells
          stay report-only is POWER, not events). The two conversion cells
          (conversion.retired_from_disabled|{female,male}) are among the 24:
          their tolerances 0.596 / 0.611 exceed ln(1.5) at any k in [2,4]
          (finding 1's correction from the invalid family reason to the true
          power demotion).
      k_selection:
        # finding F: the k choice is committed and machine-checkable, not
        # asserted. FLOW families use DRAFT_K=3; the prevalence STOCK uses
        # STOCK_K=4 -- a STATED, pre-registered deviation from the single-k
        # floor note, bound by tests/test_gates_derivations.py.
        rule: >-
          FLOW families (incidence / recovery / conversion) use DRAFT_K=3; the
          prevalence STOCK uses STOCK_K=4. The flow k is pinned by the
          faithful-candidate OC against the 2a/2b/2c precedent band: k=2 gates
          12 flow cells but collapses the gate OC to 0.2901 (unusable); k=4
          empties the flow surface (0 cells); k=3 is the only in-range [2,3]
          choice clearing precedent (flow OC 0.9717). The stock k=4 is the sole
          k at which any prevalence cell (50-59|{female,male}) survives the
          ln(1.5) cap, giving the occupancy stock its teeth.
        chosen_flow_k: 3
        chosen_stock_k: 4
        k2_flow_oc_gate_4_of_5: 0.2901
        k3_flow_oc_gate_4_of_5: 0.9717
        precedent_oc_band: { gate_2a: 0.9685, gate_2b: 0.9678, gate_2c: 0.9641 }
          # note: the 2c entry 0.9641 is 2c's p_seed (its p_gate is 0.988); mixed-level band inherited verbatim from the ratified floor (referee non-blocking note)
        uniform_k_sensitivity: { "2": 21, "3": 12, "4": 2 }
        alt_option_i_uniform_k3_oc: 0.9008
        oc_vs_precedent: >-
          flip-note 2: the adopted mixed-k faithful OC 0.9689 is AT OR ABOVE
          the precedent band (4e-4 above the 0.9685 top), not "within" it. The
          referee's option-(i) uniform k=3 over the full restored surface (12
          internal cells) scores 0.9008, BELOW the band; the adopted hybrid
          (flow@k=3 + prevalence.50-59@k=4) is the surface that clears
          precedent.
      governance:
        registration: >-
          Pre-registered on issue #42, as every gate-1 / gate-2 candidate run.
          A gate_m4 candidate registers its spec, its fitting exclusions (the
          seed-s holdout persons), and its simulation seeds BEFORE scoring.
          Outer runs are one-shot.
        amendment_rules:
          inherits: gate_1
          no_self_rescue: >-
            Inherited verbatim from gate_1.amendment_rules: no candidate's
            committed run verdict changes under a rule proposed after that run;
            a gate rule amendment applies only to runs registered after its
            ratification.
          amendments_only_via: >-
            public proposal + adversarial referee round + verification +
            maintainer ratification by merge -- the same ceremony gate 1 and
            tranche 2a / 2b / 2c amendments follow.
          description_claims_exactly_the_scored_surface: >-
            Bound by the standing rule promoted into
            gate_2.governance.amendment_rules (amendment 2): the covers /
            holdout_basis / estimand claim EXACTLY the scored surface -- the 12
            gate-eligible cells (8 internal mixed-k + 4 anchor), the PSID
            work-limitation panel crossed with the sha-pinned di_asr_2023
            anchor. No SSA DI level or provision class is headlined beyond what
            the cells gate.
        candidate_scale: >-
          PINNED to the seed-s holdout half (~50% of persons, side A); the
          candidate simulates exactly those persons, fixing the output scale
          the floor and tolerances are measured at.
        weight_definition: >-
          DIFFERS from the tranche 2a / 2b / 2c person-constant convention,
          matching the ratified M4 statistic exactly: every gated internal
          statistic is weighted by the START-WAVE (wave-w) cross-sectional
          PSID weight of each transition pair, as the frozen floor artifact's
          own foundation states and its committed numbers reproduce (start-wave
          weights reproduce every frozen tolerance; person-constant weights do
          not). There is NO unweighted gated statistic; the unweighted rate is
          reported alongside. The weighting is load-bearing, so it is pinned
          here, not inherited implicitly (flip-fidelity referee finding 1,
          PR #159).
      internal_surface:
