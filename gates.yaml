      pass_rule: >-
        Proposed pairs-c2st rule, folded into the existing gate-1
        conjunction: the pairs-view c2st threshold LEAVES the per-seed
        geometry conjunction and becomes two gate conditions -- (i) the
        mean of pairs c2st over the five locked seeds <= 0.53, and (ii)
        every seed's pairs c2st <= 0.547 (cap). A seed passes geometry
        iff every REMAINING locked geometry threshold (pairs energy,
        coverage, tails; runs coverage) AND every per-seed benefit_space
        metric hold at that seed AND that seed's pairs c2st <= the cap;
        the gate passes iff the across-seed mean pairs c2st <= 0.53 AND
        >= 4/5 seeds pass geometry AND >= 4/5 seeds pass the battery AND
        the pooled Q0 gate holds. Changes 1 and 2 alter only the
        pairs-c2st treatment; every other gate condition is inherited
        unchanged from the ratified (amendment-1) gate.
      validation_note: >-
