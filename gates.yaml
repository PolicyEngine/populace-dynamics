      estimand: >-
        the DISABILITY processes of the PSID work-limitation self-report panel
        (41,345 persons / 284,932 person-years): the age-band x sex incidence
        and recovery hazards, the disabled-prevalence occupancy stock, and the
        near-FRA (ages 60-67) disability-exit composition. Per the standing
        description_claims_exactly_the_scored_surface rule, the scored surface
        is EXACTLY these cells -- NOT the SSA DI program. The PSID self-report
        is not the DI program (seven named concept_deltas: definition,
        population, severity, transience, conversion denominator, biennial
        censoring, period pooling), so no SSA DI LEVEL is gated; the SSA-facing
        surfaces are gated only as concept-bridged SHAPE / DOMINANCE, and the
        SSA prevalence LEVELS, the 60-FRA band, the 6.B5.1 conversion level and
        the Table 49 termination trend stay report-only with their delta named.
      statistic: >-
        Two families. INTERNAL (candidate-vs-PSID reproduction): per gated cell
        the absolute log rate ratio |ln(rbar_candidate,s / rate_a,s)| between
        the candidate's mean-over-K=20-draws rate for seed s's holdout half and
        that half's own empirical PSID rate, tolerance = round(floor mean + k *
