            (finding 6). populace calibrates the certified frame to national
            admin TOTALS (earnings $9.711T, OASI $1.112T, DI $147.1B), so the
            family-A MARGINAL totals ride on a certified target. The age x sex
            x marital and household-size JOINTS family A scores are CPS-ASEC
            joints as reweighted by the L0 sparse refit (Kish n_eff ~ 14.3k
            of 166k nominal); they are NOT in populace's calibration loss and
            ride UNCERTIFIED. Family A certifies transport CONSISTENCY to those
            joints, not their external truth; the family_a_prime block makes
            the joints' own quality visible against published CPS/ACS.
