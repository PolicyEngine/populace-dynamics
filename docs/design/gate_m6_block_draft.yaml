# gate_m6 block draft (ceremony PENDING -- do NOT merge into gates.yaml yet).
#
# This is the full `gates.gate_m6` block EXACTLY as the lock flip will add it
# under the top-level `gates:` key of gates.yaml, carried here as a draft so
# the floors artifact (runs/m6_holdout_floors_v1.json) and this block bind
# string-for-string under tests/test_gate_m6_floors.py before any lock.
#
# It is `locked: false`. The OC-before-lock check (sec. 4.9 / sec. 9) does NOT
# clear the named weak-power threshold: the certifiable FLOW surface is near-
# vacuous (1 gated flow cell) and the combined faithful p_gate (0.8449) sits
# below the 0.90 floor. So `ceremony_status: paused_pending_surface_redesign`
# and this block is NOT ready to lock -- it records the computed surface for
# the ceremony referee, per the task's "publish the artifact and report" rule.
gates:
  gate_m6:
    id: m6_temporal_holdout_projection_drift
    status: draft_paused_pending_surface_redesign
    locked: false
    kind: temporal_holdout
    design: docs/design/m6_projection_engine.md
    design_pr: "170"
    design_commit: 1d83a221d33da68703eb8da61ad62acf0b881627
    design_verified_comment: "4953958949"
    adjudication: issue #42 comment 4953722912
    covers: >-
      the TEMPORAL-HOLDOUT drift of the M6 projection engine: fit <= T*=2014,
      project + score the held-out PSID window 2015-2022. Family A -- the
      PSID-projected-vs-PSID-realized dynamics-drift FLOWS (mortality, the four
      marital transitions, disability incidence/recovery) + the gated earnings-
      moment battery, FLOOR-priced. Family B -- external alignment audit +
      alignment displacement + entrant cells (report-only / margin). Family C
      -- drift-direction fingerprints (binary, optional). Does NOT re-certify
      the single-period generators (gate-1 / 2a / 2b / 2c / m4) nor certify the
      forward production engine (decision 5's successor gate).
    gates_yaml_untouched_by_this_draft: true
    floor_run: runs/m6_holdout_floors_v1.json
    floor_run_sha256: 16c28d8cd9095e5233ab224c659c8d5b9eb1621099e2524455a3a8ff8e88d318

    fit_holdout:
      boundary_T_star: 2014
      seed_wave: 2015
      seed_wave_note: >-
        PSID interviews are biennial ODD years from 1999; T*=2014 realizes its
        seed state at the 2015 interview (reference year 2014). Reference year
        2021 is unobserved (odd).
      gated_flow_event_years: [2015, 2016, 2017, 2018, 2019]
      gated_earnings_reference_years: [2016, 2018]
      person_overlap_intended: true
      disjointness: temporal_not_person

    shock_window:
      machine_reason: exogenous_shock_outside_model_class
      earnings_reference_year_axis: { report_only: [2020, 2022], gated: [2016, 2018] }
      flows_event_year_axis: { report_only: [2020, 2021], gated: "2015-2019" }
      published_as_diagnostic: true
      partitioned_out_of_gated_set: true

    presence_conditioning:
      rule: >-
        every truth cell is computed on the realized-wave-presence set (PSID
        sequence 1-20, positive weight), SYMMETRICALLY on both floor halves and
        (for the candidate, not built here) both sides (sec. 4.4). Marital
        events + at-risk person-years are conditioned on presence at the
        biennial interview OPENING the interval that contains the event year;
        mortality / disability / earnings readers are present-only by build.
      disability_scope: >-
        reproduction mode (realized support preserved); a disability PASS
        certifies a TEMPORAL gate_m4 extension, NOT M6 forward disability
        (finding 7).
      classification: conditioning_not_leakage

    f6_weight:
      definition: >-
        the person's realized start-of-holdout START-WAVE cross-sectional PSID
        weight, held FIXED across the window (F6, sec. 4.7), on the projection,
        the truth, AND the floor. The per-year calibrated panel weight is a
        report-only alternative, never the gated statistic's weight.
      start_wave: earliest gated interview wave (2015 / 2017 / 2019) at which present

    household_id_weight_carriage_rule:
      finding: "13 (sec. 9); watch-item of comment 4953958949"
      household_id: >-
        the PSID family interview number (ER30001-scoped demographic_panel
        `interview`) at the person's realized start-of-holdout wave, held FIXED
        across the window, consistent with the F6 start-wave anchoring.
      divorce_splitoff_rule: >-
        a within-window divorce / splitoff does NOT reassign household_id; both
        ex-partners keep their fixed start-wave household (conservative: keeps a
        correlated ex-couple on ONE side of the split).
      entrant_child_rule: >-
        synthetic births + immigrant cohorts are the family-B closed-panel
        entrants (sec. 4.8), OUT of the family-A floor; children present at the
        start wave carry that wave's household.
      split_bias_diagnostic_ref: floor.split_width_diagnostic

    split_units:
      household_disjoint_families: [marital, marital_stock, mortality]
      person_disjoint_families: [disability, disability_stock, earnings]
      machine: populace_dynamics.harness.panel.split_panel_by_person
      split_fraction: 0.5
      couple_disjoint_note: couple-disjoint (sec. 4.5 marital) is subsumed by the household-disjoint split

    scoring:
      floor: half_vs_half real-vs-real, presence-conditioned, correlation-respecting split
      floor_seeds: [0, 99]
      gate_seeds: [0, 1, 2, 3, 4]
      conjunction: 4 of 5 seeds
      k20_estimator: mean over K=20 draws numpy.random.default_rng(5200 + k), scored once |ln(rbar/rate_a)|
      tolerance_formula: round(floor_mean + k*sd, 3) capped at the metric power cap
      mixed_k: { flow: 3, stock: 4, margin: 3 }
      metric_caps:
        log_ratio: { cap: 0.4054651081081644, source: ln(1.5) }
        abs_gap_log: { cap: 0.4054651081081644, source: ln(1.5) (change-mean is in log units) }
        abs_gap_corr: { cap: 0.15, source: "0.15 = ~2x gate_1 autocorr_log_10yr_tolerance 0.07" }

    # ---- The GATED family-A registry (string-bindable, per-cell) ----
    # 17 gated cells: 1 FLOW (marital) + 16 earnings-moment. Each row's
    # tolerance is round(floor mean + k*sd, 3), capped at the metric's cap and
    # bound to floor.cells[key] by tests/test_gate_m6_floors.py.
    views:
      flow_hazards:
        quantity_type: flow
        family: marital
        split_unit: household
        statistic: >-
          per age-band x sex weighted per-interval transition hazard,
          |ln(rbar/rate_a)|; only first_marriage.18-29|female clears the ln(1.5)
          cap at k=3 (the holdout-window event counts leave every other flow
          band above the cap or below the 20-event floor).
        floor_run: runs/m6_holdout_floors_v1.json
        tolerances:
          "first_marriage.18-29|female": 0.356
        derivations:
          floor_run: runs/m6_holdout_floors_v1.json
          rules:
            "first_marriage.18-29|female": { key: "first_marriage.18-29|female", k: 3, rounding: 3, metric: log_ratio }
      earnings_log_ratio:
        quantity_type: flow
        family: earnings
        split_unit: person
        statistic: >-
          earnings moments expressed on the log-ratio scale (age-profile level
          quantiles, zero-earnings rate, mobility-diagonal retention prob,
          SD of Delta-log earnings), |ln(a/b)| capped ln(1.5), by cohort.
        floor_run: runs/m6_holdout_floors_v1.json
        tolerances:
          "earn_p10.prime": 0.221
          "earn_p10.older": 0.281
          "earn_p50.prime": 0.092
          "earn_p50.older": 0.127
          "earn_p90.prime": 0.132
          "earn_p90.older": 0.15
          "earn_zero_rate.prime": 0.219
          "earn_zero_rate.older": 0.163
          "earn_dlog_sd.prime": 0.136
          "earn_dlog_sd.older": 0.269
          "earn_mob_h1_diag": 0.052
          "earn_mob_h2_diag": 0.086
        derivations:
          floor_run: runs/m6_holdout_floors_v1.json
          rules:
            "earn_p10.prime": { key: "earn_p10.prime", k: 3, rounding: 3, metric: log_ratio }
            "earn_p10.older": { key: "earn_p10.older", k: 3, rounding: 3, metric: log_ratio }
            "earn_p50.prime": { key: "earn_p50.prime", k: 3, rounding: 3, metric: log_ratio }
            "earn_p50.older": { key: "earn_p50.older", k: 3, rounding: 3, metric: log_ratio }
            "earn_p90.prime": { key: "earn_p90.prime", k: 3, rounding: 3, metric: log_ratio }
            "earn_p90.older": { key: "earn_p90.older", k: 3, rounding: 3, metric: log_ratio }
            "earn_zero_rate.prime": { key: "earn_zero_rate.prime", k: 3, rounding: 3, metric: log_ratio }
            "earn_zero_rate.older": { key: "earn_zero_rate.older", k: 3, rounding: 3, metric: log_ratio }
            "earn_dlog_sd.prime": { key: "earn_dlog_sd.prime", k: 3, rounding: 3, metric: log_ratio }
            "earn_dlog_sd.older": { key: "earn_dlog_sd.older", k: 3, rounding: 3, metric: log_ratio }
            "earn_mob_h1_diag": { key: "earn_mob_h1_diag", k: 3, rounding: 3, metric: log_ratio }
            "earn_mob_h2_diag": { key: "earn_mob_h2_diag", k: 3, rounding: 3, metric: log_ratio }
      earnings_abs_gap:
        quantity_type: flow
        family: earnings
        split_unit: person
        statistic: >-
          signed earnings moments scored on the absolute-gap scale |a-b| (the
          gate_1 autocorr_log absolute-tolerance precedent): change-mean of
          Delta-log earnings (log units, ln(1.5) cap) and log-earnings
          autocorrelation lags 1-2 (correlation units, 0.15 cap).
        floor_run: runs/m6_holdout_floors_v1.json
        tolerances:
          "earn_dlog_mean.prime": 0.043
          "earn_dlog_mean.older": 0.047
          "earn_autocorr_lag1": 0.059
          "earn_autocorr_lag2": 0.087
        derivations:
          floor_run: runs/m6_holdout_floors_v1.json
          rules:
            "earn_dlog_mean.prime": { key: "earn_dlog_mean.prime", k: 3, rounding: 3, metric: abs_gap_log }
            "earn_dlog_mean.older": { key: "earn_dlog_mean.older", k: 3, rounding: 3, metric: abs_gap_log }
            "earn_autocorr_lag1": { key: "earn_autocorr_lag1", k: 3, rounding: 3, metric: abs_gap_corr }
            "earn_autocorr_lag2": { key: "earn_autocorr_lag2", k: 3, rounding: 3, metric: abs_gap_corr }

    gated_roll_up:
      n_gated: 17
      n_gated_flow_cells: 1
      n_gated_earnings_cells: 16
      by_family: { marital: 1, earnings: 16 }

    # ---- Report-only registry (roll-up by machine reason; sec. 4.1/4.4/4.6) ----
    report_only:
      n_report_only: 88
      by_machine_reason:
        below_20_events_weaker_half: 41
        stock_report_only_margin: 18
        tolerance_above_power_cap: 12
        undefined_on_some_seed: 10
        dimensionless_shape_no_power_cap: 4
        attrition_confounded_truth: 2
        horizon_exceeds_holdout_span: 1
    report_reasons:
      - attrition_confounded_truth
      - below_20_events_weaker_half
      - dimensionless_shape_no_power_cap
      - horizon_exceeds_holdout_span
      - stock_report_only_margin
      - tolerance_above_power_cap
      - undefined_on_some_seed
    attrition_demotion:
      machine_reason: attrition_confounded_truth
      cells: ["death.85+|female", "death.85+|male"]
      basis: >-
        sec. 4.4 / F7: PSID panel attrition (death-vs-dropout ambiguity +
        nursing-home non-interview) confounds the oldest-old death hazard beyond
        repair ("mortality worst"); demoted PRE-LOCK. Younger retained mortality
        cells' residual attrition bias is disclosed, not demoted.

    faithful_candidate_oc:
      basis_note: >-
        Independence-approx normal OC on the DRAW-NOISE-FREE half-normal basis
        (a faithful candidate's per-cell score ~ half-normal(realized_sigma);
        cell pass = 2*Phi(tolerance/sigma)-1; seed pass = product over gated
        cells; gate = P(>=4 of 5) = p^5 + 5 p^4 (1-p)). The K=20-draw mean
        estimator shares this basis. Bound to the floor's faithful_candidate_oc
        by tests/test_gate_m6_floors.py.
      combined: { n_gated_cells: 17, p_seed_pass: 0.8553, p_gate_pass_4_of_5: 0.8449 }
      family_a_flows: { n_gated_cells: 1, p_gate_pass_4_of_5: 0.9993 }
      earnings_subfamily: { n_gated_cells: 16, p_gate_pass_4_of_5: 0.858 }

    oc_before_lock:
      weak_power_p_gate_floor: 0.90
      min_gated_flow_cells: 4
      p_gate_combined: 0.8449
      p_gate_flows: 0.9993
      clears_lower_bound_not_unpassable: false
      clears_flow_surface_power: false
      clears_weak_power_threshold: false
      ceremony_may_proceed: false
      pause_direction: both_near_vacuous_flow_surface_and_near_unpassable_combined
      recommendation: >-
        surface redesign (coarsen the sparse marital / mortality strata --
        e.g. sex-pool the low-frequency transitions or widen the oldest bands --
        and/or extend the flow event window, then rebuild the floor), NOT a
        threshold widening.

    split_width_diagnostic:
      mean_household_over_person: 1.0034
      note: >-
        person-disjoint vs household-disjoint floor widths on the household-
        split family-A cells; ~1.0 confirms the T*-anchored household-ID rule
        does not bias the family-A floor (the sec. 9 finding-13 watch-item).

    data:
      n_holdout_persons: 29792
      n_households: 9410
